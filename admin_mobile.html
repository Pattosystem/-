<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出荷指示書</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Hiragino Sans','Yu Gothic',sans-serif; background:#f0f4f9; min-height:100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, getDocsFromServer, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyDNg5KsLABnwJbN5EpvWjpLnkstFzXA1HE",
    authDomain: "order-tracking-92681.firebaseapp.com",
    projectId: "order-tracking-92681",
    storageBucket: "order-tracking-92681.appspot.com",
    messagingSenderId: "1039511713787",
    appId: "1:1039511713787:web:abc123"
  });
  const db = getFirestore(app);

  window._mfb = {
    loadAnnotations: async () => {
      try {
        const d = await getDoc(doc(db, "appdata", "annotations"));
        return d.exists() ? (d.data().data || {}) : {};
      } catch(e) { return {}; }
    },
    // 写真を個別ドキュメントで保存（1MB制限回避）
    savePhoto: async (date, clinic, orderId, productName, photoBase64) => {
      const id = Date.now();
      const newEntry = {
        id, date, clinic, orderId, productName,
        photo: photoBase64,
        takenAt: new Date().toISOString()
      };
      // ship_photos コレクションに個別ドキュメントとして保存
      await setDoc(doc(db, "ship_photos", String(id)), newEntry);
      return newEntry;
    },
    loadPhotos: async () => {
      try {
        const snap = await getDocs(collection(db, "ship_photos"));
        const list = [];
        snap.forEach(d => list.push(d.data()));
        return list.sort((a,b) => a.id - b.id);
      } catch(e) { return []; }
    }
  };
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// 画像圧縮
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 900;
        const ratio = Math.min(max/img.width, max/img.height, 1);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── ログイン ──────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  return (
    <div style={{ minHeight:"100vh", background:"#0f2744", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ background:"#fff", borderRadius:20, padding:"36px 24px", width:"100%", maxWidth:340 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:44, marginBottom:8 }}>📦</div>
          <div style={{ fontSize:22, fontWeight:900, color:"#0f2744" }}>出荷指示書</div>
          <div style={{ fontSize:13, color:"#8a95a5", marginTop:4 }}>スタッフ用</div>
        </div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&(pw==="Lias0032"?onLogin():setErr("パスワードが違います"))}
          placeholder="パスワードを入力"
          style={{ width:"100%", padding:"14px", borderRadius:12, border:"1.5px solid #dde4ef", fontSize:16, outline:"none", marginBottom:10, textAlign:"center" }} />
        {err && <div style={{ color:"#e05050", fontSize:13, textAlign:"center", marginBottom:8 }}>{err}</div>}
        <button onClick={() => pw==="Lias0032" ? onLogin() : setErr("パスワードが違います")}
          style={{ width:"100%", padding:"14px", borderRadius:12, border:"none", background:"#0f2744", color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer" }}>
          ログイン
        </button>
      </div>
    </div>
  );
}

// ── 写真モーダル ──────────────────────────────────────────────────────────
function PhotoModal({ src, onClose }) {
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div onClick={e=>e.stopPropagation()} style={{ position:"relative", maxWidth:"100%", maxHeight:"90vh" }}>
        <img src={src} style={{ maxWidth:"100%", maxHeight:"85vh", borderRadius:10, objectFit:"contain", display:"block" }} />
        <button onClick={onClose} style={{ position:"absolute", top:-14, right:-14, width:34, height:34, borderRadius:"50%", border:"none", background:"#fff", fontSize:18, fontWeight:700, cursor:"pointer", boxShadow:"0 2px 10px rgba(0,0,0,0.5)" }}>✕</button>
      </div>
    </div>
  );
}

// ── メイン ────────────────────────────────────────────────────────────────
function MainScreen() {
  const [annotations, setAnnotations] = useState({});
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [step, setStep] = useState("dates"); // dates / clinics / items
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedClinic, setSelectedClinic] = useState(null);
  const [saving, setSaving] = useState(false);
  const [photoModal, setPhotoModal] = useState(null);
  const cameraRef = useRef();
  const fileRef = useRef();
  const [shootingItem, setShootingItem] = useState(null); // 撮影対象

  useEffect(() => {
    (async () => {
      const [ann, ph] = await Promise.all([
        window._mfb.loadAnnotations(),
        window._mfb.loadPhotos()
      ]);
      setAnnotations(ann);
      setPhotos(ph);
      setLoading(false);
    })();
  }, []);

  // 出荷指示データを日付・クリニック別に集計
  const shipData = {}; // { date: { clinic: [ {orderId, productName, qty, unit, instrId} ] } }
  Object.entries(annotations).forEach(([orderId, ann]) => {
    (ann.shipInstructions||[]).forEach(instr => {
      if (!instr.instructedAt) return;
      const date = instr.instructedAt;
      if (!shipData[date]) shipData[date] = {};
      // クリニック名はorderId→clinicのマッピングが必要だが、
      // annotationsにはclinicがないのでorderIdから類推
      // clinicをorderId先頭で仮グループ（後で改善）
      const clinic = ann.clinic || orderId;
      if (!shipData[date][clinic]) shipData[date][clinic] = [];
      shipData[date][clinic].push({
        orderId, productName: instr.productName,
        qty: instr.qty, unit: instr.unit||"", instrId: instr.id
      });
    });
  });

  const dates = Object.keys(shipData).sort().reverse();

  // 選択日付のクリニック一覧
  const clinics = selectedDate ? Object.keys(shipData[selectedDate]||{}).sort() : [];

  // 選択クリニックの商品一覧
  const items = (selectedDate && selectedClinic) ? (shipData[selectedDate][selectedClinic]||[]) : [];

  // 撮影済み写真の取得
  const getPhotos = (orderId, productName) =>
    photos.filter(p => p.orderId===orderId && p.productName===productName);

  const handlePhoto = async (file) => {
    if (!file || !shootingItem) return;
    setSaving(true);
    try {
      const compressed = await compressImage(file);
      const entry = await window._mfb.savePhoto(
        selectedDate, selectedClinic,
        shootingItem.orderId, shootingItem.productName, compressed
      );
      setPhotos(prev => [...prev, entry]);
      setShootingItem(null);
    } catch(e) {
      alert("保存エラー: " + e.message);
    }
    setSaving(false);
  };

  if (loading) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12, background:"#f0f4f9" }}>
      <div style={{ fontSize:36 }}>📦</div>
      <div style={{ color:"#8a95a5", fontSize:14 }}>読み込み中...</div>
    </div>
  );

  return (
    <div style={{ background:"#f0f4f9", minHeight:"100vh", paddingBottom:48 }}>
      {/* ヘッダー */}
      <div style={{ background:"#0f2744", padding:"16px 16px 16px", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          {step !== "dates" && (
            <button onClick={() => { if(step==="items"){setStep("clinics");setSelectedClinic(null);} else {setStep("dates");setSelectedDate(null);} }}
              style={{ border:"none", background:"rgba(255,255,255,0.15)", color:"#fff", borderRadius:20, padding:"6px 12px", fontSize:13, cursor:"pointer" }}>
              ← 戻る
            </button>
          )}
          <div style={{ flex:1 }}>
            <div style={{ fontSize:17, fontWeight:900, color:"#fff" }}>📦 出荷指示書</div>
            {step==="clinics" && <div style={{ fontSize:12, color:"#d4a843", marginTop:2 }}>{selectedDate}</div>}
            {step==="items" && <div style={{ fontSize:12, color:"#d4a843", marginTop:2 }}>{selectedDate} / {selectedClinic}</div>}
          </div>
        </div>
      </div>

      <div style={{ padding:"14px 12px" }}>

        {/* STEP1: 日付選択 */}
        {step==="dates" && (<>
          <div style={{ fontSize:13, color:"#8a95a5", marginBottom:12 }}>出荷指示日を選択してください</div>
          {dates.length === 0 ? (
            <div style={{ textAlign:"center", padding:"60px 20px", background:"#fff", borderRadius:14, border:"1.5px solid #e4eaf3" }}>
              <div style={{ fontSize:36, marginBottom:12 }}>📋</div>
              <div style={{ fontSize:15, fontWeight:700, color:"#4a5568" }}>出荷指示がありません</div>
              <div style={{ fontSize:13, color:"#8a95a5", marginTop:8 }}>PC管理画面で出荷指示を入力してください</div>
            </div>
          ) : dates.map(date => {
            const clinicCount = Object.keys(shipData[date]).length;
            const itemCount = Object.values(shipData[date]).flat().length;
            const photoCount = photos.filter(p=>p.date===date).length;
            return (
              <button key={date} onClick={() => { setSelectedDate(date); setStep("clinics"); }}
                style={{ width:"100%", background:"#fff", borderRadius:14, border:"1.5px solid #e4eaf3",
                  padding:"16px", marginBottom:10, cursor:"pointer", textAlign:"left", display:"block" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div>
                    <div style={{ fontSize:18, fontWeight:900, color:"#0f2744" }}>{date}</div>
                    <div style={{ fontSize:12, color:"#8a95a5", marginTop:4 }}>
                      {clinicCount}クリニック・{itemCount}商品
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    {photoCount > 0 ? (
                      <span style={{ padding:"4px 10px", borderRadius:20, background:"#e8f4ee", color:"#1a7a50", fontSize:12, fontWeight:700 }}>
                        📷 {photoCount}枚
                      </span>
                    ) : (
                      <span style={{ padding:"4px 10px", borderRadius:20, background:"#fff0f0", color:"#e05050", fontSize:12, fontWeight:700 }}>
                        未撮影
                      </span>
                    )}
                    <div style={{ fontSize:20, color:"#c0c8d4", marginTop:4 }}>›</div>
                  </div>
                </div>
              </button>
            );
          })}
        </>)}

        {/* STEP2: クリニック選択 */}
        {step==="clinics" && (<>
          <div style={{ fontSize:13, color:"#8a95a5", marginBottom:12 }}>クリニックを選択してください</div>
          {clinics.map(clinic => {
            const items = shipData[selectedDate][clinic];
            const photoCount = photos.filter(p=>p.date===selectedDate && p.clinic===clinic).length;
            return (
              <button key={clinic} onClick={() => { setSelectedClinic(clinic); setStep("items"); }}
                style={{ width:"100%", background:"#fff", borderRadius:14, border:"1.5px solid #e4eaf3",
                  padding:"16px", marginBottom:10, cursor:"pointer", textAlign:"left", display:"block" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <div>
                    <div style={{ fontSize:16, fontWeight:800, color:"#0f2744" }}>{clinic}</div>
                    <div style={{ fontSize:12, color:"#8a95a5", marginTop:3 }}>{items.length}商品</div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    {photoCount > 0 ? (
                      <span style={{ padding:"4px 10px", borderRadius:20, background:"#e8f4ee", color:"#1a7a50", fontSize:12, fontWeight:700 }}>📷 {photoCount}</span>
                    ) : (
                      <span style={{ padding:"4px 10px", borderRadius:20, background:"#fff0f0", color:"#e05050", fontSize:12, fontWeight:700 }}>未撮影</span>
                    )}
                    <div style={{ fontSize:22, color:"#c0c8d4" }}>›</div>
                  </div>
                </div>
              </button>
            );
          })}
        </>)}

        {/* STEP3: 商品一覧 + 撮影 */}
        {step==="items" && (<>
          <div style={{ fontSize:13, color:"#8a95a5", marginBottom:12 }}>商品を確認して写真を撮影してください</div>

          {/* 商品リスト */}
          {items.map((item, i) => {
            const itemPhotos = getPhotos(item.orderId, item.productName);
            return (
              <div key={i} style={{ background:"#fff", borderRadius:14, border:"1.5px solid #e4eaf3", padding:"14px", marginBottom:10 }}>
                <div style={{ fontSize:11, color:"#a0aab8", marginBottom:3 }}>受注番号 {item.orderId}</div>
                <div style={{ fontSize:14, fontWeight:700, color:"#0f2744", lineHeight:1.5, marginBottom:8 }}>{item.productName}</div>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                  <span style={{ padding:"4px 12px", borderRadius:20, background:"#f0f4ff", color:"#1a4a90", fontWeight:700, fontSize:14 }}>
                    {item.qty}{item.unit}
                  </span>
                  <span style={{ fontSize:12, color:"#8a95a5" }}>出荷指示済み</span>
                </div>

                {/* 撮影済み写真 */}
                {itemPhotos.length > 0 && (
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
                    {itemPhotos.map((p, pi) => (
                      <div key={pi} style={{ position:"relative" }}>
                        <img src={p.photo} onClick={() => setPhotoModal(p.photo)}
                          style={{ width:72, height:72, objectFit:"cover", borderRadius:8, border:"2px solid #3aa876", cursor:"pointer" }} />
                        <div style={{ position:"absolute", bottom:2, right:2, background:"rgba(0,0,0,0.5)", borderRadius:4, padding:"1px 4px", fontSize:9, color:"#fff" }}>
                          {new Date(p.takenAt).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* 撮影ボタン */}
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={() => { setShootingItem(item); cameraRef.current.click(); }}
                    style={{ flex:1, padding:"12px", borderRadius:10, border:"none",
                      background: itemPhotos.length>0 ? "#e8f4ee" : "#0f2744",
                      color: itemPhotos.length>0 ? "#1a7a50" : "#fff",
                      fontWeight:700, fontSize:14, cursor:"pointer" }}>
                    {itemPhotos.length>0 ? "📷 追加撮影" : "📷 写真を撮る"}
                  </button>
                  <button onClick={() => { setShootingItem(item); fileRef.current.click(); }}
                    style={{ padding:"12px 16px", borderRadius:10, border:"1.5px solid #dde4ef", background:"#f8fafd", color:"#6a7a8a", fontWeight:700, fontSize:14, cursor:"pointer" }}>
                    🖼️
                  </button>
                </div>
              </div>
            );
          })}

          {/* 一括撮影ボタン */}
          <div style={{ background:"#fff", borderRadius:14, border:"2px solid #d4a843", padding:"16px", marginTop:16, textAlign:"center" }}>
            <div style={{ fontSize:13, color:"#7a6020", marginBottom:10, fontWeight:700 }}>📦 梱包全体を撮影</div>
            <button onClick={() => { setShootingItem({orderId:"all", productName:"梱包全体", qty:"", unit:""}); cameraRef.current.click(); }}
              style={{ width:"100%", padding:"14px", borderRadius:10, border:"none", background:"#d4a843", color:"#0f2744", fontWeight:800, fontSize:15, cursor:"pointer" }}>
              📷 まとめて撮影
            </button>
          </div>
        </>)}

      </div>

      {/* カメラ・ファイル入力 */}
      <input ref={cameraRef} type="file" accept="image/*" capture="environment"
        onChange={e => { if(e.target.files[0]) handlePhoto(e.target.files[0]); e.target.value=""; }}
        style={{ display:"none" }} />
      <input ref={fileRef} type="file" accept="image/*"
        onChange={e => { if(e.target.files[0]) handlePhoto(e.target.files[0]); e.target.value=""; }}
        style={{ display:"none" }} />

      {/* 保存中オーバーレイ */}
      {saving && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ background:"#fff", borderRadius:16, padding:"28px 36px", textAlign:"center" }}>
            <div style={{ fontSize:32, marginBottom:10 }}>📷</div>
            <div style={{ fontSize:15, fontWeight:700, color:"#0f2744" }}>保存中...</div>
          </div>
        </div>
      )}

      {/* 写真拡大モーダル */}
      {photoModal && <PhotoModal src={photoModal} onClose={() => setPhotoModal(null)} />}
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(false);
  return authed ? <MainScreen /> : <LoginScreen onLogin={() => setAuthed(true)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
