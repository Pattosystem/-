<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>出荷管理 モバイル</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f0f4f9; min-height: 100vh; }
input, button, select, textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, getDocsFromServer, doc, getDoc, setDoc, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNg5KsLABnwJbN5EpvWjpLnkstFzXA1HE",
    authDomain: "order-tracking-92681.firebaseapp.com",
    projectId: "order-tracking-92681",
    storageBucket: "order-tracking-92681.appspot.com",
    messagingSenderId: "1039511713787",
    appId: "1:1039511713787:web:abc123"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const ADMIN_PASSWORD = "Lias0032";

  window._mobileFirebase = {
    loadOrders: async () => {
      try {
        const snap = await getDocsFromServer(collection(db, "orders"));
        const list = [];
        snap.forEach(d => list.push(d.data()));
        return list;
      } catch(e) { return []; }
    },
    loadAnnotations: async () => {
      try {
        const d = await getDoc(doc(db, "appdata", "annotations"));
        return d.exists() ? (d.data().data || {}) : {};
      } catch(e) { return {}; }
    },
    saveAnnotations: async (orders) => {
      const data = {};
      orders.forEach(o => {
        if (o.paymentStatus || o.paymentDate || (o.shipInstructions||[]).length > 0) {
          data[o.id] = {
            paymentStatus: o.paymentStatus || "",
            paymentDate: o.paymentDate || "",
            shipInstructions: o.shipInstructions || [],
          };
        }
      });
      await setDoc(doc(db, "appdata", "annotations"), {
        data, savedAt: new Date().toISOString(), count: Object.keys(data).length
      });
    },
    saveShipment: async (shipment) => {
      // 発送記録をshipmentsコレクションに保存
      await addDoc(collection(db, "shipments"), {
        ...shipment,
        createdAt: new Date().toISOString()
      });
    },
    updateOrderShipInstruction: async (allOrders, orderId, productName, qty, photoBase64) => {
      const now = new Date().toLocaleDateString("ja-JP", {year:"numeric",month:"2-digit",day:"2-digit"});
      const instr = { id: Date.now(), productName, qty: String(qty), unit: "", instructedAt: now, photo: photoBase64 || "" };
      // annotationsに追記
      const ann = await window._mobileFirebase.loadAnnotations();
      if (!ann[orderId]) ann[orderId] = { paymentStatus:"", paymentDate:"", shipInstructions:[] };
      ann[orderId].shipInstructions = [...(ann[orderId].shipInstructions || []), instr];
      await setDoc(doc(db, "appdata", "annotations"), {
        data: ann, savedAt: new Date().toISOString(), count: Object.keys(ann).length
      });
      return instr;
    }
  };
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// 画像圧縮
function compressImage(file, maxWidth=800, quality=0.65) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ratio = Math.min(maxWidth / img.width, maxWidth / img.height, 1);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── ログイン画面 ──────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const handle = () => {
    if (pw === "Lias0032") { onLogin(); }
    else { setErr("パスワードが違います"); }
  };
  return (
    <div style={{ minHeight:"100vh", background:"#0f2744", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ background:"#fff", borderRadius:20, padding:"36px 28px", width:"100%", maxWidth:360 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:40, marginBottom:8 }}>📦</div>
          <div style={{ fontSize:20, fontWeight:900, color:"#0f2744" }}>出荷管理</div>
          <div style={{ fontSize:13, color:"#8a95a5", marginTop:4 }}>管理者ログイン</div>
        </div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handle()}

        {err && <div style={{ color:"#e05050", fontSize:13, marginBottom:8, textAlign:"center" }}>{err}</div>}
        <button onClick={handle}
          style={{ width:"100%", padding:"14px", borderRadius:12, border:"none", background:"#0f2744", color:"#fff", fontWeight:800, fontSize:16, cursor:"pointer" }}>
          ログイン
        </button>
      </div>
    </div>
  );
}

// ── 出荷指示モーダル ──────────────────────────────────────────────────────────
function ShipModal({ order, product, onClose, onSave }) {
  const [qty, setQty] = useState("");
  const [photo, setPhoto] = useState(null);
  const [saving, setSaving] = useState(false);
  const [step, setStep] = useState("input"); // input / photo / confirm / done
  const fileRef = useRef();
  const cameraRef = useRef();

  const handlePhoto = async (file) => {
    if (!file) return;
    const compressed = await compressImage(file);
    setPhoto(compressed);
    setStep("confirm");
  };

  const handleSave = async () => {
    if (!qty.trim()) return;
    setSaving(true);
    try {
      await window._mobileFirebase.updateOrderShipInstruction(null, order.id, product.name, qty, photo || "");
      setStep("done");
      setTimeout(() => { onSave(); onClose(); }, 1500);
    } catch(e) {
      alert("保存エラー: " + e.message);
    }
    setSaving(false);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"flex-end", zIndex:100 }}>
      <div style={{ background:"#fff", borderRadius:"20px 20px 0 0", width:"100%", padding:"24px 20px", paddingBottom:40, maxHeight:"90vh", overflowY:"auto" }}>
        {step === "done" ? (
          <div style={{ textAlign:"center", padding:"30px 0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>✅</div>
            <div style={{ fontSize:18, fontWeight:800, color:"#1a7a50" }}>出荷指示完了！</div>
          </div>
        ) : (<>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <div style={{ fontSize:16, fontWeight:800, color:"#0f2744" }}>📤 出荷指示</div>
            <button onClick={onClose} style={{ border:"none", background:"none", fontSize:24, cursor:"pointer", color:"#8a95a5" }}>✕</button>
          </div>

          {/* 商品情報 */}
          <div style={{ background:"#f8fafd", borderRadius:12, padding:"12px 14px", marginBottom:20 }}>
            <div style={{ fontSize:11, color:"#8a95a5", marginBottom:3 }}>受注番号 {order.id}</div>
            <div style={{ fontSize:13, fontWeight:700, color:"#0f2744", lineHeight:1.5 }}>{product.name}</div>
            <div style={{ fontSize:12, color:"#8a95a5", marginTop:3 }}>受注数：{product.totalQtyNum}{product.unit} / 未納：{product.undelivered}{product.unit}</div>
          </div>

          {/* 数量入力 */}
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#0f2744", marginBottom:8 }}>出荷数量</div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <input type="number" value={qty} onChange={e=>setQty(e.target.value)} placeholder="数量" min="1"
                style={{ flex:1, padding:"14px", borderRadius:12, border:"1.5px solid #dde4ef", fontSize:18, fontWeight:700, outline:"none", textAlign:"center" }} />
              <span style={{ fontSize:15, color:"#4a5568", fontWeight:600 }}>{product.unit}</span>
            </div>
          </div>

          {/* 写真撮影 */}
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#0f2744", marginBottom:8 }}>出荷写真（任意）</div>
            {photo ? (
              <div style={{ position:"relative" }}>
                <img src={photo} style={{ width:"100%", borderRadius:12, maxHeight:200, objectFit:"cover" }} />
                <button onClick={() => { setPhoto(null); setStep("input"); }}
                  style={{ position:"absolute", top:8, right:8, border:"none", background:"rgba(0,0,0,0.6)", color:"#fff", borderRadius:20, padding:"4px 10px", fontSize:12, cursor:"pointer" }}>
                  撮り直す
                </button>
              </div>
            ) : (
              <div style={{ display:"flex", gap:10 }}>
                {/* カメラ撮影 */}
                <button onClick={() => cameraRef.current.click()}
                  style={{ flex:1, padding:"16px", borderRadius:12, border:"2px dashed #4a7cc7", background:"#f0f4ff", color:"#4a7cc7", fontWeight:700, fontSize:14, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:28 }}>📷</span>
                  カメラで撮影
                </button>
                {/* ファイル選択 */}
                <button onClick={() => fileRef.current.click()}
                  style={{ flex:1, padding:"16px", borderRadius:12, border:"2px dashed #8a95a5", background:"#f8fafd", color:"#6a7a8a", fontWeight:700, fontSize:14, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:28 }}>🖼️</span>
                  ライブラリ
                </button>
              </div>
            )}
            <input ref={cameraRef} type="file" accept="image/*" capture="environment" onChange={e=>handlePhoto(e.target.files[0])} style={{ display:"none" }} />
            <input ref={fileRef} type="file" accept="image/*" onChange={e=>handlePhoto(e.target.files[0])} style={{ display:"none" }} />
          </div>

          {/* 保存ボタン */}
          <button onClick={handleSave} disabled={!qty.trim() || saving}
            style={{ width:"100%", padding:"16px", borderRadius:14, border:"none",
              background: qty.trim() ? "linear-gradient(135deg,#0f2744,#1a3d6e)" : "#dde4ef",
              color: qty.trim() ? "#fff" : "#aab", fontWeight:800, fontSize:16, cursor: qty.trim() ? "pointer" : "default" }}>
            {saving ? "保存中..." : "✅ 出荷指示を確定する"}
          </button>
        </>)}
      </div>
    </div>
  );
}

// ── メイン画面 ──────────────────────────────────────────────────────────────
function MainScreen() {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [search, setSearch] = useState("");
  const [month, setMonth] = useState("");

  const loadData = async () => {
    setLoading(true);
    const [orderData, annotations] = await Promise.all([
      window._mobileFirebase.loadOrders(),
      window._mobileFirebase.loadAnnotations(),
    ]);
    // 注釈をマージ
    const merged = orderData.map(o => {
      const ann = annotations[o.id] || {};
      return { ...o, paymentStatus: ann.paymentStatus || o.paymentStatus || "", paymentDate: ann.paymentDate || o.paymentDate || "", shipInstructions: ann.shipInstructions || o.shipInstructions || [] };
    });
    merged.sort((a,b) => String(b.id) > String(a.id) ? -1 : 1);
    merged.reverse();
    setOrders(merged);
    // 最新月を初期選択
    const months = [...new Set(merged.map(o => (o.date||"").slice(0,7)))].filter(Boolean).sort().reverse();
    if (months.length > 0 && !month) setMonth(months[0]);
    setLoading(false);
  };

  useEffect(() => { loadData(); }, []);

  // 月一覧
  const months = [...new Set(orders.map(o => (o.date||"").slice(0,7)))].filter(Boolean).sort().reverse();

  // 未納商品のある注文を絞り込む
  const pendingOrders = orders.filter(o => {
    const inMonth = !month || (o.date||"").startsWith(month.replace("年","").replace("月",""));
    if (!inMonth) return false;
    const hasPending = o.products.some(p => p.status !== 6);
    if (!hasPending) return false;
    if (!search.trim()) return true;
    return o.id.includes(search) || (o.clinic||"").includes(search) || o.products.some(p => (p.name||"").includes(search));
  });

  if (loading) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#f0f4f9" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:36, marginBottom:12 }}>📦</div>
        <div style={{ color:"#8a95a5", fontSize:14 }}>読み込み中...</div>
      </div>
    </div>
  );

  return (
    <div style={{ background:"#f0f4f9", minHeight:"100vh", paddingBottom:40 }}>
      {/* ヘッダー */}
      <div style={{ background:"#0f2744", padding:"16px 16px 20px", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <div style={{ fontSize:18, fontWeight:900, color:"#fff" }}>📦 出荷管理</div>
          <button onClick={loadData} style={{ border:"none", background:"rgba(255,255,255,0.15)", color:"#fff", borderRadius:20, padding:"6px 14px", fontSize:13, cursor:"pointer", fontWeight:700 }}>
            🔄 更新
          </button>
        </div>
        {/* 月選択 */}
        <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:4 }}>
          {months.map(m => (
            <button key={m} onClick={() => setMonth(m)}
              style={{ padding:"6px 14px", borderRadius:20, border:"1.5px solid", whiteSpace:"nowrap", cursor:"pointer", fontSize:13, fontWeight:700,
                borderColor: month===m ? "#d4a843" : "rgba(255,255,255,0.3)",
                background: month===m ? "#d4a843" : "transparent",
                color: month===m ? "#0f2744" : "rgba(255,255,255,0.8)" }}>
              {m}
            </button>
          ))}
        </div>
      </div>

      {/* 検索 */}
      <div style={{ padding:"12px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="受注番号・クリニック・商品名"
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #dde4ef", fontSize:14, outline:"none", background:"#fff" }} />
      </div>

      {/* 件数表示 */}
      <div style={{ padding:"8px 16px", fontSize:12, color:"#8a95a5" }}>
        未納あり：{pendingOrders.length}注文
      </div>

      {/* 注文リスト */}
      <div style={{ padding:"0 12px" }}>
        {pendingOrders.map(order => (
          <div key={order.id} style={{ background:"#fff", borderRadius:14, marginBottom:10, overflow:"hidden", border:"1.5px solid #e4eaf3" }}>
            {/* 注文ヘッダー */}
            <div style={{ padding:"12px 14px", borderBottom:"1px solid #f0f4f9", background:"#f8fafd" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:900, color:"#0f2744" }}>{order.id}</div>
                  <div style={{ fontSize:12, color:"#8a95a5", marginTop:2 }}>{order.clinic}</div>
                </div>
                <div style={{ fontSize:11, color:"#a0aab8" }}>{order.date}</div>
              </div>
            </div>

            {/* 未納商品リスト */}
            {order.products.filter(p => p.status !== 6).map((p, i) => {
              const instructed = (order.shipInstructions||[]).filter(s => s.productName === p.name);
              const instructedQty = instructed.reduce((sum, s) => sum + (parseInt(s.qty)||0), 0);
              const undelivered = (p.totalQtyNum||0) - (p.deliveredQtyNum||0);
              const hasPhoto = instructed.some(s => s.photo);
              return (
                <div key={i} style={{ padding:"12px 14px", borderBottom:"1px solid #f8fafd", display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:"#1a2a3a", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.name}</div>
                    <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap" }}>
                      <span style={{ fontSize:11, color:"#8a95a5" }}>未納 {undelivered}{p.unit}</span>
                      {instructedQty > 0 && (
                        <span style={{ fontSize:11, fontWeight:700, color:"#1a7a50", background:"#e8f4ee", padding:"1px 7px", borderRadius:10 }}>
                          指示済 {instructedQty}{p.unit} {hasPhoto ? "📷" : ""}
                        </span>
                      )}
                    </div>
                  </div>
                  <button
                    onClick={() => { setSelectedOrder(order); setSelectedProduct({...p, undelivered}); }}
                    style={{ padding:"10px 14px", borderRadius:10, border:"none", background:"#e07d20", color:"#fff", fontWeight:800, fontSize:13, cursor:"pointer", whiteSpace:"nowrap", flexShrink:0 }}>
                    📤 指示
                  </button>
                </div>
              );
            })}
          </div>
        ))}

        {pendingOrders.length === 0 && (
          <div style={{ textAlign:"center", padding:"60px 20px", color:"#a0aab8" }}>
            <div style={{ fontSize:40, marginBottom:12 }}>✅</div>
            <div style={{ fontSize:15, fontWeight:700 }}>未納商品はありません</div>
          </div>
        )}
      </div>

      {/* 出荷指示モーダル */}
      {selectedOrder && selectedProduct && (
        <ShipModal
          order={selectedOrder}
          product={selectedProduct}
          onClose={() => { setSelectedOrder(null); setSelectedProduct(null); }}
          onSave={() => { loadData(); }}
        />
      )}
    </div>
  );
}

// ── アプリ ──────────────────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(false);
  return authed ? <MainScreen /> : <LoginScreen onLogin={() => setAuthed(true)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
