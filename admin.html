<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNg5KsLABnwJbN5EpvWjpLnkstFzXA1HE",
    authDomain: "order-tracking-92681.firebaseapp.com",
    projectId: "order-tracking-92681",
    storageBucket: "order-tracking-92681.firebasestorage.app",
    messagingSenderId: "988787355455",
    appId: "1:988787355455:web:c7ce248d9fe2178636ed8a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const API_KEY = "AIzaSyDNg5KsLABnwJbN5EpvWjpLnkstFzXA1HE";

  window._firebase = {
    loadOrders: async () => {
      const snap = await getDocs(collection(db, "orders"));
      const list = [];
      snap.forEach(d => list.push(d.data()));
      return list;
    },
    saveOrders: async (orders) => {
      const snap = await getDocs(collection(db, "orders"));
      await Promise.all(snap.docs.map(d => deleteDoc(doc(db,"orders",d.id))));
      await Promise.all(orders.map(o => setDoc(doc(db,"orders",o.id), o)));
      return true;
    },
    // 新規クリニックアカウント作成（REST API経由）
    createClinicAccount: async (email) => {
      const tempPw = "Temp" + Math.random().toString(36).slice(2,10) + "!";
      const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email, password: tempPw, returnSecureToken: false })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      // パスワード設定メールを送信
      await sendPasswordResetEmail(auth, email);
      return true;
    },
    sendPasswordReset: (email) => sendPasswordResetEmail(auth, email),
    loadRequests: async () => {
      const snap = await getDocs(collection(db, "requests"));
      const list = [];
      snap.forEach(d => list.push(d.data()));
      return list.sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    },
    replyRequest: async (id, reply) => {
      const now = new Date().toLocaleString("ja-JP", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
      await updateDoc(doc(db, "requests", id), { reply, status: "replied", repliedAt: now });
      return true;
    },
    markRequestRead: async (id) => {
      await updateDoc(doc(db, "requests", id), { status: "read" });
    }
  };
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const ADMIN_PASSWORD = "vands2026";

const STATUS_STAGES = [
  { id:0, label:"注文受付済み",        icon:"📋", color:"#8a9ab5", short:"受付済" },
  { id:1, label:"海外発送準備中",       icon:"📦", color:"#6b8cba", short:"準備中" },
  { id:2, label:"輸出国空港到着",       icon:"✈️", color:"#4a7cc7", short:"空港到着" },
  { id:3, label:"日本へ航空輸送中",     icon:"🌏", color:"#d4a843", short:"輸送中" },
  { id:4, label:"日本空港・通関待ち",   icon:"🛂", color:"#e07d20", short:"通関待ち" },
  { id:5, label:"通関完了・国内配送中", icon:"🚚", color:"#3aa876", short:"配送中" },
  { id:6, label:"お届け完了",           icon:"✅", color:"#0f2744", short:"完了" },
  { id:7, label:"一部発送済み",         icon:"🔶", color:"#e07d20", short:"一部発送済" },
];

function nowStr(){ return new Date().toLocaleString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); }
function toMonthKey(d){ const m=(d||"").match(/(\d{4}年\d{2}月)/); return m?m[1]:"不明"; }
function groupBy(arr,fn){ return arr.reduce((a,o)=>{ const k=fn(o); if(!a[k])a[k]=[]; a[k].push(o); return a; },{}); }

function parseBcartCSV(text) {
  function parseRow(line) {
    const result=[]; let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){result.push(cur.trim());cur="";}else{cur+=c;}
    }
    result.push(cur.trim()); return result;
  }

  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers=parseRow(lines[0]);

  // 物流CSVか受注CSVかを自動判定
  const isLogistics = headers[0]==="Bカート発送ID";

  const idx={
    orderNo:    headers.indexOf("受注番号"),
    company:    headers.indexOf("会社名"),
    dateTime:   headers.indexOf("受注日時"),
    itemName:   headers.indexOf("商品名"),
    spec:       headers.indexOf("製品規格"),
    qty:        headers.indexOf("受注数"),
    unit:       headers.indexOf("単位"),
    shipStatus: headers.indexOf("発送状況"),
    shipDate:   headers.indexOf("発送日"),
    delivDate:  headers.indexOf("納品日"),
    category:   headers.indexOf("明細区分"),
  };

  const orderMap={};

  for(let i=1;i<lines.length;i++){
    const row=parseRow(lines[i]);
    const orderNo=row[idx.orderNo]||""; if(!orderNo) continue;

    // 受注CSVの場合は明細区分チェック
    if(!isLogistics){
      const cat=row[idx.category]||"";
      if(cat&&cat!=="商品") continue;
    }

    const itemName=(row[idx.itemName]||"").replace(/\n/g," ").trim();
    if(!itemName||itemName==="送料"||itemName==="決済手数料") continue;

    // 注文情報を初期化
    if(!orderMap[orderNo]){
      const rawDate=row[idx.dateTime]||"";
      const d=rawDate?new Date(rawDate):null;
      const dateStr=d?`${d.getFullYear()}年${String(d.getMonth()+1).padStart(2,"0")}月${String(d.getDate()).padStart(2,"0")}日`:"";
      orderMap[orderNo]={ id:orderNo, date:dateStr, clinic:(row[idx.company]||"").trim(), updatedAt:nowStr(), products:[] };
    }

    const qtyNum=parseInt(row[idx.qty]||"0",10)||0;
    const unit=row[idx.unit]||"";
    const spec=(row[idx.spec]||"").replace(/\n/g," ").trim();
    const displayName=spec?`${itemName}（${spec}）`:itemName;
    const shipStatus=row[idx.shipStatus]||"";
    const delivDate=row[idx.delivDate]||"";
    const shipDate=row[idx.shipDate]||"";
    const isDelivered=shipStatus==="発送済"&&delivDate;

    if(isLogistics){
      // ── 物流CSV：同一商品を累積して分納管理 ──────────────────
      const existing=orderMap[orderNo].products.find(p=>p.name===displayName);
      const record={ qty:qtyNum, unit, status:shipStatus, delivDate, shipDate };
      if(existing){
        existing.totalQtyNum=(existing.totalQtyNum||0)+qtyNum;
        if(isDelivered) existing.deliveredQtyNum=(existing.deliveredQtyNum||0)+qtyNum;
        existing.deliveryRecords.push(record);
      } else {
        orderMap[orderNo].products.push({
          name: displayName, unit,
          totalQtyNum: qtyNum,
          deliveredQtyNum: isDelivered?qtyNum:0,
          qty: "", status:0, eta:"約30日", note:"",
          deliveryRecords:[record]
        });
      }
    } else {
      // ── 受注CSV：1行1商品（シンプル）──────────────────────────
      let autoStatus=0;
      if(shipStatus==="発送済"&&delivDate) autoStatus=6;
      else if(shipStatus==="発送済") autoStatus=5;
      orderMap[orderNo].products.push({
        name:displayName, qty:qtyNum&&unit?`${qtyNum}${unit}`:unit||"—",
        status:autoStatus, eta:autoStatus===6?"—":autoStatus===5?"間もなくお届け":"約30日",
        note:"", deliveryInfo:"", deliveryRecords:[]
      });
    }
  }

  // 物流CSV：数量・ステータスを確定
  if(isLogistics){
    Object.values(orderMap).forEach(order=>{
      order.products.forEach(p=>{
        const total=p.totalQtyNum||0;
        const delivered=p.deliveredQtyNum||0;
        p.qty=`${total}${p.unit}`;
        if(delivered>=total&&total>0){
          p.status=6; p.eta="—"; p.deliveryInfo="";
        } else if(delivered>0){
          p.status=7; p.eta="—";
          p.deliveryInfo=`${total}${p.unit}中 ${delivered}${p.unit}納品済み`;
        } else {
          p.status=0; p.eta="約30日"; p.deliveryInfo="";
        }
        // deliveryRecordsを日付でソート（納品済み→未発送の順）
        p.deliveryRecords.sort((a,b)=>{
          if(a.status==="発送済"&&b.status!=="発送済") return -1;
          if(a.status!=="発送済"&&b.status==="発送済") return 1;
          return (b.delivDate||"").localeCompare(a.delivDate||"");
        });
      });
    });
  }

  return Object.values(orderMap);
}

        <div style={{ textAlign:"center",marginBottom:28 }}>
          <div style={{ width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#0f2744,#1a3d6e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px" }}>🔐</div>

          style={{ width:"100%",padding:"13px 14px",borderRadius:10,border:`1.5px solid ${err?"#e05050":"#dde4ef"}`,fontSize:16,outline:"none",color:"#0f2744",marginBottom:err?6:14 }}/>

      </div>
    </div>
  );
}

// ── クリニックアカウント管理 ───────────────────────────────────────────────
function ClinicAccountManager() {
  const [email, setEmail] = useState("");
  const [status, setStatus] = useState(""); // "" | "loading" | "success" | "exists" | "error"
  const [resetEmail, setResetEmail] = useState("");
  const [resetStatus, setResetStatus] = useState("");

  const waitFirebase = async () => {
    let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;}
  };

  const handleCreate = async () => {
    if (!email.trim()) return;
    setStatus("loading");
    await waitFirebase();
    try {
      await window._firebase.createClinicAccount(email.trim());
      setStatus("success");
      setEmail("");
    } catch(e) {
      if (e.message.includes("EMAIL_EXISTS")) { setStatus("exists"); }
      else { setStatus("error"); console.error(e); }
    }
  };

  const handleReset = async () => {
    if (!resetEmail.trim()) return;
    setResetStatus("loading");
    await waitFirebase();
    try {
      await window._firebase.sendPasswordReset(resetEmail.trim());
      setResetStatus("success");
    } catch(e) {
      setResetStatus("error");
    }
  };

  const inp = { width:"100%",padding:"10px 12px",borderRadius:9,border:"1.5px solid #dde4ef",fontSize:14,outline:"none",color:"#1a2a3a" };

  return (
    <div style={{ display:"flex",flexDirection:"column",gap:16 }}>

      {/* 新規クリニック登録 */}
      <div style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",padding:"20px",boxShadow:"0 2px 10px rgba(10,30,53,0.05)" }}>
        <div style={{ fontSize:14,fontWeight:800,color:"#0f2744",marginBottom:4 }}>新規クリニックアカウントを登録</div>
        <div style={{ fontSize:12,color:"#8a95a5",marginBottom:16,lineHeight:1.6 }}>
          メールアドレスを登録すると、クリニック担当者にパスワード設定メールが自動送信されます。
        </div>

        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:4 }}>クリニックのメールアドレス</div>
          <input value={email} onChange={e=>{setEmail(e.target.value);setStatus("");}}
            onKeyDown={e=>e.key==="Enter"&&handleCreate()}
            placeholder="clinic@example.com" type="email" style={inp} />
        </div>

        {status==="success" && (
          <div style={{ padding:"10px 14px",background:"#f0fdf6",border:"1px solid #a0d8b8",borderRadius:9,fontSize:13,color:"#1a7a50",fontWeight:600,marginBottom:12 }}>
            ✅ アカウントを作成しました。パスワード設定メールを送信しました。
          </div>
        )}
        {status==="exists" && (
          <div style={{ padding:"10px 14px",background:"#fffbef",border:"1px solid #e8c95a",borderRadius:9,fontSize:13,color:"#7a6020",marginBottom:12 }}>
            ⚠ このメールアドレスはすでに登録されています。
          </div>
        )}
        {status==="error" && (
          <div style={{ padding:"10px 14px",background:"#fff0f0",border:"1px solid #e0c0c0",borderRadius:9,fontSize:13,color:"#c05050",marginBottom:12 }}>
            ❌ 登録に失敗しました。メールアドレスを確認してください。
          </div>
        )}

        <button onClick={handleCreate} disabled={status==="loading"} style={{ width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#0f2744,#1a3d6e)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:status==="loading"?0.7:1 }}>
          {status==="loading" ? "登録中..." : "アカウントを作成してメール送信"}
        </button>
      </div>

      {/* パスワードリセット */}
      <div style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",padding:"20px",boxShadow:"0 2px 10px rgba(10,30,53,0.05)" }}>
        <div style={{ fontSize:14,fontWeight:800,color:"#0f2744",marginBottom:4 }}>パスワードリセットメールを再送</div>
        <div style={{ fontSize:12,color:"#8a95a5",marginBottom:16,lineHeight:1.6 }}>
          パスワードを忘れたクリニックにリセットメールを再送します。
        </div>
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:4 }}>クリニックのメールアドレス</div>
          <input value={resetEmail} onChange={e=>{setResetEmail(e.target.value);setResetStatus("");}}
            onKeyDown={e=>e.key==="Enter"&&handleReset()}
            placeholder="clinic@example.com" type="email" style={inp} />
        </div>
        {resetStatus==="success" && (
          <div style={{ padding:"10px 14px",background:"#f0fdf6",border:"1px solid #a0d8b8",borderRadius:9,fontSize:13,color:"#1a7a50",fontWeight:600,marginBottom:12 }}>
            ✅ パスワードリセットメールを送信しました。
          </div>

        {resetStatus==="error" && (
          <div style={{ padding:"10px 14px",background:"#fff0f0",border:"1px solid #e0c0c0",borderRadius:9,fontSize:13,color:"#c05050",marginBottom:12 }}>

        </button>
      </div>
    </div>
  );
}

// ── CSV インポート ────────────────────────────────────────────────────────
function CsvImportModal({ onImport, onClose }) {
  const [drag,setDrag]=useState(false); const [preview,setPreview]=useState(null); const [error,setError]=useState(""); const [encoding,setEncoding]=useState("shift_jis");
  const fileRef=useRef();
  const readFile=(file)=>{
    setError("");
    const reader=new FileReader();
    reader.onload=(e)=>{
      try{
        const bytes=new Uint8Array(e.target.result);
        let text; try{ text=new TextDecoder(encoding).decode(bytes); }catch{ text=new TextDecoder("utf-8").decode(bytes); }
        const orders=parseBcartCSV(text);
        if(orders.length===0){ setError("注文データが見つかりませんでした。"); return; }
        setPreview(orders);
      }catch(err){ setError("読み込みに失敗しました: "+err.message); }
    };
    reader.readAsArrayBuffer(file);
  };
  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(10,20,40,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16 }}>
      <div style={{ background:"#fff",borderRadius:18,padding:"24px 22px",width:"100%",maxWidth:480,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
          <div style={{ fontSize:16,fontWeight:800,color:"#0f2744" }}>bcart CSVインポート</div>
          <button onClick={onClose} style={{ background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#8a95a5" }}>✕</button>
        </div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>文字コード</div>
          <div style={{ display:"flex",gap:8 }}>
            {[["shift_jis","Shift-JIS（標準）"],["utf-8","UTF-8"]].map(([v,l])=>(
              <button key={v} onClick={()=>setEncoding(v)} style={{ padding:"7px 14px",borderRadius:8,border:"1.5px solid",borderColor:encoding===v?"#0f2744":"#dde4ef",background:encoding===v?"#0f2744":"#fff",color:encoding===v?"#fff":"#555",fontSize:12.5,cursor:"pointer",fontWeight:encoding===v?700:400 }}>{l}</button>
            ))}
          </div>
        </div>
        {!preview&&(
          <div className={`drop-zone${drag?" drag-over":""}`}
            onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)readFile(f);}}
            onClick={()=>fileRef.current.click()}>
            <div style={{ fontSize:36,marginBottom:10 }}>📂</div>
            <div style={{ fontSize:14,fontWeight:700,color:"#0f2744",marginBottom:4 }}>CSVファイルをドラッグ＆ドロップ</div>
            <div style={{ fontSize:12.5,color:"#8a95a5",marginBottom:12 }}>または</div>
            <div style={{ display:"inline-block",padding:"9px 20px",borderRadius:9,background:"#0f2744",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer" }}>ファイルを選択</div>
            <input ref={fileRef} type="file" accept=".csv" onChange={e=>{if(e.target.files[0])readFile(e.target.files[0]);}} style={{ display:"none" }}/>
          </div>
        )}
        {error&&<div style={{ padding:"10px 14px",background:"#fff0f0",border:"1px solid #e0c0c0",borderRadius:10,color:"#c05050",fontSize:13,marginTop:12 }}>⚠ {error}</div>}
        {preview&&(
          <div>
            <div style={{ padding:"10px 14px",background:"#f0fdf6",border:"1px solid #a0d8b8",borderRadius:10,marginBottom:14,fontSize:13,color:"#1a7a50",fontWeight:600 }}>
              ✅ {preview.length}件の注文、合計{preview.reduce((s,o)=>s+o.products.length,0)}商品を読み込みました
            </div>
            <div style={{ maxHeight:240,overflowY:"auto",border:"1.5px solid #e4eaf3",borderRadius:12,marginBottom:14 }}>
              {preview.map((o,i)=>(
                <div key={i} style={{ padding:"10px 14px",borderBottom:"1px solid #f0f4f9" }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                    <span style={{ fontSize:13.5,fontWeight:800,color:"#0f2744" }}>{o.id}</span>
                    <span style={{ fontSize:11,color:"#8a95a5" }}>{o.date}</span>
                  </div>
                  <div style={{ fontSize:12,color:"#6a7a8a",marginBottom:6 }}>{o.clinic}</div>
                  <div style={{ display:"flex",flexWrap:"wrap",gap:5 }}>
                    {o.products.map((p,j)=><span key={j} style={{ padding:"3px 8px",borderRadius:6,background:"#f0f4ff",color:"#2a5090",fontSize:11,border:"1px solid #d0ddf0" }}>{p.name.length>22?p.name.slice(0,22)+"…":p.name}　{p.qty}</span>)}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background:"#fffbef",border:"1px solid #e8c95a",borderRadius:10,padding:"10px 14px",fontSize:12.5,color:"#7a6020",marginBottom:14 }}>
              💡 全商品「注文受付済み」で取り込まれます。取り込み後にステータスを更新してください。
            </div>
            <div style={{ display:"flex",gap:8 }}>
              <button onClick={()=>setPreview(null)} style={{ flex:1,padding:12,borderRadius:10,border:"1.5px solid #dde4ef",background:"#fff",fontSize:14,cursor:"pointer",color:"#666" }}>やり直す</button>
              <button onClick={()=>{ onImport(preview); onClose(); }} style={{ flex:2,padding:12,borderRadius:10,border:"none",background:"linear-gradient(135deg,#0f2744,#1a3d6e)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer" }}>{preview.length}件をインポートする</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── 商品エディター ────────────────────────────────────────────────────────

  const s=STATUS_STAGES[product.status];
  return (
    <div style={{ borderBottom:"1px solid #f0f4f9" }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ display:"flex",alignItems:"center",padding:"11px 14px",cursor:"pointer",gap:10,background:open?"#f4f7fc":"#fff" }}>
        <div style={{ width:22,height:22,borderRadius:6,background:"#f0f4ff",color:"#4a7cc7",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>{index+1}</div>
        <div style={{ flex:1,minWidth:0 }}>
          <div style={{ fontSize:13,fontWeight:600,color:"#1a2a3a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{product.name||"（未入力）"}</div>
          <div style={{ display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap" }}>
            <span style={{ fontSize:11,color:"#8a95a5" }}>{product.qty}</span>

            <span style={{ fontSize:11,fontWeight:700,color:s.color }}>{s.icon} {s.short}</span>

      {open&&(
        <div style={{ padding:"12px 14px 14px",background:"#f4f7fc",borderTop:"1px solid #edf0f6" }}>

            <div style={{ marginBottom:10,padding:"10px 12px",background:"#fff8f0",borderRadius:9,border:"1px solid #f0c090" }}>
              <div style={{ fontSize:11,color:"#a04010",fontWeight:700,marginBottom:8 }}>🔶 分納履歴</div>
              {product.deliveryRecords.map((r,i)=>(
                <div key={i} style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4,fontSize:12 }}>
                  <span style={{ padding:"2px 7px",borderRadius:5,background:r.status==="発送済"?"#e8f4ee":"#f4f6fb",color:r.status==="発送済"?"#1a7a50":"#6a7a8a",fontWeight:700,fontSize:11,flexShrink:0 }}>

                  {r.delivDate&&<span style={{ color:"#8a95a5" }}>納品日：{r.delivDate}</span>}
                  {r.shipDate&&!r.delivDate&&<span style={{ color:"#8a95a5" }}>発送日：{r.shipDate}</span>}

          )}
          <div style={{ display:"grid",gridTemplateColumns:"1fr auto",gap:8,marginBottom:10 }}>
            <div>
              <div style={{ fontSize:11,color:"#8a95a5",marginBottom:3 }}>商品名</div>
              <input value={product.name} onChange={e=>onChange("name",e.target.value)} style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid #dde4ef",fontSize:13,outline:"none" }}/>
            </div>
            <div style={{ width:90 }}>
              <div style={{ fontSize:11,color:"#8a95a5",marginBottom:3 }}>数量</div>
              <input value={product.qty} onChange={e=>onChange("qty",e.target.value)} style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid #dde4ef",fontSize:13,outline:"none" }}/>
            </div>

          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11,color:"#8a95a5",marginBottom:6 }}>ステータス</div>
            <div style={{ display:"flex",flexWrap:"wrap",gap:5 }}>
              {STATUS_STAGES.map(st=>(
                <button key={st.id} onClick={()=>onChange("status",st.id)} style={{ padding:"5px 9px",borderRadius:8,border:"1.5px solid",borderColor:product.status===st.id?st.color:"#dde4ef",background:product.status===st.id?st.color:"#fff",color:product.status===st.id?"#fff":"#4a5568",fontSize:11,fontWeight:product.status===st.id?700:400,cursor:"pointer",whiteSpace:"nowrap" }}>
                  {st.icon} {st.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10 }}>
            <div>

              <input value={product.eta} onChange={e=>onChange("eta",e.target.value)} placeholder="例：約10日" style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid #dde4ef",fontSize:13,outline:"none" }}/>
            </div>
            <div>
              <div style={{ fontSize:11,color:"#8a95a5",marginBottom:3 }}>備考（お客様に表示）</div>
              <input value={product.note} onChange={e=>onChange("note",e.target.value)} placeholder="例：通関待ちです" style={{ width:"100%",padding:"8px 10px",borderRadius:8,border:"1.5px solid #dde4ef",fontSize:13,outline:"none" }}/>
            </div>
          </div>
          <div style={{ display:"flex",justifyContent:"flex-end" }}>
            <button onClick={onDelete} style={{ padding:"6px 12px",borderRadius:8,border:"1.5px solid #e0c0c0",background:"#fff8f8",color:"#c05050",fontSize:12,cursor:"pointer",fontWeight:600 }}>この商品を削除</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 注文カード ────────────────────────────────────────────────────────────
function OrderCard({ order, onUpdate, onDelete }) {
  const [open,setOpen]=useState(false);
  const active=order.products.filter(p=>p.status<6).length;
  const updateProduct=(pi,field,value)=>onUpdate(order.id,"products",order.products.map((p,i)=>i===pi?{...p,[field]:value}:p));
  const deleteProduct=(pi)=>{ if(!confirm("この商品を削除しますか？"))return; onUpdate(order.id,"products",order.products.filter((_,i)=>i!==pi)); };
  const addProduct=()=>{ onUpdate(order.id,"products",[...order.products,{name:"",qty:"",status:0,eta:"約30日",note:""}]); setOpen(true); };
  return (
    <div style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",marginBottom:10,overflow:"hidden",boxShadow:"0 1px 8px rgba(10,30,53,0.05)",borderLeft:`4px solid ${active>0?"#d4a843":"#0f2744"}` }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ padding:"13px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
        <div style={{ flex:1,minWidth:0,paddingRight:8 }}>
          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap" }}>
            <span style={{ fontSize:15,fontWeight:900,color:"#0f2744",letterSpacing:"0.04em" }}>{order.id}</span>
            {active>0?<span style={{ padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:"#fff8e8",color:"#b87f0a",border:"1px solid #e8c95a" }}>対応中 {active}件</span>:<span style={{ padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:"#e8f0fa",color:"#0f2744",border:"1px solid #c0d0e8" }}>✅ 全件完了</span>}
          </div>
          <div style={{ fontSize:11.5,color:"#8a95a5" }}>{order.date}　{order.clinic}　全{order.products.length}種類</div>
        </div>
        <div style={{ fontSize:16,color:"#aab",transform:open?"rotate(180deg)":"none",transition:"transform 0.2s",marginTop:2 }}>⌄</div>
      </div>
      {open&&(
        <div style={{ borderTop:"1.5px solid #f0f4f9" }}>
          {order.products.map((p,i)=><ProductEditor key={i} product={p} index={i} onChange={(f,v)=>updateProduct(i,f,v)} onDelete={()=>deleteProduct(i)}/>)}
          <div style={{ padding:"10px 14px",background:"#f8fafd",borderTop:"1px solid #edf0f6",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <button onClick={addProduct} style={{ padding:"7px 14px",borderRadius:8,border:"1.5px solid #4a7cc7",background:"#f0f6ff",color:"#2a5090",fontSize:12.5,cursor:"pointer",fontWeight:700 }}>＋ 商品を追加</button>
            <div style={{ display:"flex",gap:8,alignItems:"center" }}>
              <span style={{ fontSize:10.5,color:"#c0c8d4" }}>更新：{order.updatedAt}</span>
              <button onClick={()=>{ if(confirm("この注文を削除しますか？"))onDelete(order.id); }} style={{ padding:"6px 12px",borderRadius:8,border:"1.5px solid #e0c0c0",background:"#fff8f8",color:"#c05050",fontSize:12,cursor:"pointer",fontWeight:600 }}>注文削除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── グループセクション ────────────────────────────────────────────────────
function GroupSection({ title, orders, onUpdate, onDelete, defaultOpen }) {
  const [open,setOpen]=useState(defaultOpen??true);
  const activeCount=orders.filter(o=>o.products.some(p=>p.status<6)).length;
  return (
    <div style={{ marginBottom:14 }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:open?"#0f2744":"#fff",border:open?"none":"1.5px solid #e4eaf3",cursor:"pointer",marginBottom:open?8:0 }}>
        <div style={{ display:"flex",alignItems:"center",gap:8 }}>
          <div style={{ fontSize:14,fontWeight:800,color:open?"#fff":"#0f2744" }}>{title}</div>
          <span style={{ padding:"2px 9px",borderRadius:20,fontSize:11.5,fontWeight:700,background:open?"rgba(255,255,255,0.15)":"#f0f4f9",color:open?"#fff":"#6a7a8a" }}>{orders.length}件</span>
          {activeCount>0&&<span style={{ padding:"2px 9px",borderRadius:20,fontSize:11.5,fontWeight:700,background:open?"rgba(212,168,67,0.3)":"#fff8e8",color:open?"#ffd878":"#b87f0a",border:open?"1px solid rgba(212,168,67,0.4)":"1px solid #e8c95a" }}>対応中 {activeCount}</span>}
        </div>
        <div style={{ fontSize:16,color:open?"rgba(255,255,255,0.6)":"#aab",transform:open?"rotate(180deg)":"none",transition:"transform 0.2s" }}>⌄</div>
      </div>
      {open&&orders.map(o=><OrderCard key={o.id} order={o} onUpdate={onUpdate} onDelete={onDelete}/>)}
    </div>
  );
}



// ── ステータス管理 ─────────────────────────────────────────────────────────
function StatusManager({ orders, onUpdate }) {
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [selectedClinic, setSelectedClinic] = useState("all");

  function toMonthKey(d) {
    const m = (d||"").match(/(\d{4}年\d{2}月)/);
    return m ? m[1] : "不明";
  }

  const months = [...new Set(orders.map(o => toMonthKey(o.date)))].sort((a,b) => b.localeCompare(a));
  const currentMonth = selectedMonth || months[0] || "";
  const monthOrders = orders.filter(o => toMonthKey(o.date) === currentMonth);
  const clinics = ["all", ...new Set(monthOrders.map(o => o.clinic).filter(Boolean))];
  const filtered = selectedClinic === "all" ? monthOrders : monthOrders.filter(o => o.clinic === selectedClinic);
  const allP = filtered.flatMap(o => o.products);

  const stats = {
    done:    allP.filter(p => p.status === 6).length,
    partial: allP.filter(p => p.status === 7).length,
    notship: allP.filter(p => p.status < 5 && p.status !== 7).length,
    total:   allP.length,
  };

  function statusLabel(p) {
    if (p.status === 6) return { text:"完了",    bg:"#e8f4ee", color:"#1a7a50" };
    if (p.status === 7) return { text:"一部納品", bg:"#fff8f0", color:"#e07d20" };
    if (p.status === 5) return { text:"配送中",   bg:"#f0f6ff", color:"#3aa876" };
    if (p.status === 4) return { text:"通関中",   bg:"#fff8e8", color:"#b87f0a" };
    return                     { text:"未納",     bg:"#fff0f0", color:"#e05050" };
  }

  function delivSummary(p) {
    if (!p.deliveryRecords || p.deliveryRecords.length === 0) {
      if (p.status === 6) return [{ label: p.qty, date:"完了", done:true }];
      return [{ label: p.qty, date:"未発送", done:false }];
    }
    return p.deliveryRecords.filter(r => r.qty > 0).map(r => ({
      label: `${r.qty}${r.unit||""}`,
      date:  r.delivDate ? r.delivDate.slice(5) : (r.shipDate ? r.shipDate.slice(5) : "未発送"),
      done:  r.status === "発送済"
    }));
  }

  return (
    <div style={{ fontSize:12 }}>

      {/* 月タブ */}
      <div style={{ display:"flex", gap:4, marginBottom:10, flexWrap:"wrap" }}>
        {months.map(m => (
          <button key={m} onClick={() => { setSelectedMonth(m); setSelectedClinic("all"); }}
            style={{ padding:"4px 11px", borderRadius:14, border:"1.5px solid", flexShrink:0,
              borderColor:currentMonth===m?"#0f2744":"#dde4ef",
              background:currentMonth===m?"#0f2744":"#fff",
              color:currentMonth===m?"#fff":"#4a5568",
              fontWeight:currentMonth===m?700:400, fontSize:11.5, cursor:"pointer" }}>
            {m}
          </button>
        ))}
      </div>

      {/* サマリー + クリニック絞り込み */}
      <div style={{ display:"flex", gap:10, marginBottom:10, alignItems:"flex-start", flexWrap:"wrap" }}>
        <div style={{ display:"flex", gap:5 }}>
          {[
            { l:"完了",    v:stats.done,    c:"#1a7a50", bg:"#e8f4ee" },
            { l:"一部納品", v:stats.partial, c:"#e07d20", bg:"#fff8f0" },
            { l:"未納",    v:stats.notship, c:"#e05050", bg:"#fff0f0" },
            { l:"商品計",  v:stats.total,   c:"#0f2744", bg:"#f0f4f9" },
          ].map(s => (
            <div key={s.l} style={{ background:s.bg, borderRadius:8, padding:"4px 10px", textAlign:"center", minWidth:50 }}>
              <div style={{ fontSize:15, fontWeight:900, color:s.c, lineHeight:1 }}>{s.v}</div>
              <div style={{ fontSize:9, color:s.c, opacity:0.8 }}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:4, flexWrap:"wrap", flex:1 }}>
          {clinics.map(c => (
            <button key={c} onClick={() => setSelectedClinic(c)}
              style={{ padding:"3px 9px", borderRadius:12, border:"1.5px solid",
                borderColor:selectedClinic===c?"#d4a843":"#dde4ef",
                background:selectedClinic===c?"#d4a843":"#fff",
                color:selectedClinic===c?"#0f2744":"#4a5568",
                fontWeight:selectedClinic===c?700:400, fontSize:11, cursor:"pointer", whiteSpace:"nowrap" }}>
              {c === "all" ? "全て" : c}
            </button>
          ))}
        </div>
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign:"center", padding:"40px", color:"#aaa" }}>該当する注文がありません</div>
      )}

      {/* テーブル：overflow:hidden で横スクロールなし */}
      <div style={{ border:"1.5px solid #e4eaf3", borderRadius:10, overflow:"hidden", boxShadow:"0 2px 8px rgba(10,30,53,0.05)" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11.5 }}>
          <colgroup>
            <col style={{ width:"11%" }} />
            <col style={{ width:"10%" }} />
            <col style={{ width:"17%" }} />
            <col style={{ width:"5%" }} />
            <col style={{ width:"18%" }} />
            <col style={{ width:"5%" }} />
            <col style={{ width:"7%" }} />
            <col style={{ width:"9%" }} />
            <col style={{ width:"9%" }} />
            <col style={{ width:"9%" }} />
          </colgroup>
          <thead>
            <tr style={{ background:"#0f2744" }}>
              {["受注番号","クリニック","商品名","受注数","納品履歴","未納数","状況","入金状況","入金日","出荷指示"].map(h => (
                <th key={h} style={{ padding:"7px 8px", textAlign: h==="受注数"||h==="未納数"||h==="状況" ? "center" : "left",
                  color:"rgba(255,255,255,0.85)", fontWeight:700, whiteSpace:"nowrap", fontSize:11.5 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((order, oi) =>
              order.products.map((p, pi) => {
                const sc = statusLabel(p);
                const delivs = delivSummary(p);
                const totalQty  = p.totalQtyNum || 0;
                const delivered = p.deliveredQtyNum || (p.status===6 ? totalQty : 0);
                const remaining = Math.max(0, totalQty - delivered);
                const isFirst = pi === 0;
                const rowCount = order.products.length;
                const rowBg = oi % 2 === 0 ? "#fff" : "#f9fafc";
                return (
                  <tr key={`${order.id}-${pi}`} style={{ borderBottom:"1px solid #edf0f6", background:rowBg }}>
                    {isFirst && (
                      <td rowSpan={rowCount} style={{ padding:"7px 8px", verticalAlign:"top",
                        borderRight:"1px solid #edf0f6", background:rowBg }}>
                        <a href={`https://pitto.i15.bcart.jp/admin/order/list?order_code=${order.id}&sort=order_time-desc&limit=25`}
                          target="_blank" rel="noopener noreferrer"
                          style={{ color:"#1a6abf", textDecoration:"underline", fontWeight:700, fontSize:11, display:"block" }}>
                          {order.id}
                        </a>
                        <div style={{ fontSize:10, color:"#8a95a5", marginTop:1 }}>
                          {(order.date||"").replace("2026年","").replace("日","")}
                        </div>
                        <button
                          onClick={() => {
                            if (!confirm(`${order.id}の全商品（${order.products.length}種）を受注数で一括出荷指示しますか？`)) return;
                            const now = new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});
                            const newInstrs = order.products.map(p => ({
                              id: Date.now() + Math.random(),
                              productName: p.name,
                              qty: (p.totalQtyNum||parseInt(p.qty)||"").toString(),
                              unit: p.unit||"",
                              instructedAt: now
                            }));
                            const merged = [...(order.shipInstructions||[]), ...newInstrs];
                            onUpdate(order.id, "shipInstructions", merged);
                          }}
                          style={{ marginTop:6, width:"100%", padding:"4px 0", borderRadius:6,
                            border:"1.5px solid #4a7cc7", background:"#f0f6ff",
                            color:"#1a4a90", fontSize:10, fontWeight:700, cursor:"pointer",
                            whiteSpace:"nowrap" }}>
                          📦 一括指示
                        </button>
                      </td>
                    )}
                    {isFirst && (
                      <td rowSpan={rowCount} style={{ padding:"7px 8px", verticalAlign:"top",
                        borderRight:"1px solid #edf0f6", color:"#333", lineHeight:1.4, background:rowBg,
                        wordBreak:"break-all" }}>
                        {order.clinic}
                      </td>
                    )}
                    <td style={{ padding:"6px 8px", color:"#1a2a3a", lineHeight:1.4,
                      borderRight:"1px solid #edf0f6", wordBreak:"break-all" }}>
                      {p.name}
                    </td>
                    <td style={{ padding:"6px 8px", textAlign:"center", fontWeight:700,
                      color:"#1a2a3a", borderRight:"1px solid #edf0f6", whiteSpace:"nowrap" }}>
                      {p.qty}
                    </td>
                    <td style={{ padding:"5px 8px", borderRight:"1px solid #edf0f6" }}>
                      {delivs.map((d, j) => (
                        <div key={j} style={{ display:"flex", alignItems:"center", gap:4, lineHeight:1.6 }}>
                          <span style={{ fontSize:10, fontWeight:700,
                            color: d.done ? "#1a7a50" : "#a0aab8" }}>
                            {d.done ? "✅" : "📋"} {d.label}
                          </span>
                          <span style={{ fontSize:10, color: d.done ? "#1a7a50" : "#a0aab8" }}>
                            {d.date}
                          </span>
                        </div>
                      ))}
                    </td>
                    <td style={{ padding:"6px 8px", textAlign:"center",
                      borderRight:"1px solid #edf0f6", whiteSpace:"nowrap" }}>
                      {remaining > 0
                        ? <span style={{ fontWeight:900, color:"#e05050", fontSize:12 }}>{remaining}{p.unit||""}</span>
                        : <span style={{ color:"#3aa876", fontWeight:700 }}>—</span>
                      }
                    </td>
                    <td style={{ padding:"6px 8px", textAlign:"center" }}>
                      <span style={{ padding:"2px 7px", borderRadius:20, fontSize:10.5, fontWeight:700,
                        background:sc.bg, color:sc.color, whiteSpace:"nowrap" }}>
                        {sc.text}
                      </span>
                    </td>
                    {isFirst && (
                      <td rowSpan={rowCount} style={{ padding:"6px 8px", verticalAlign:"top",
                        borderLeft:"1px solid #edf0f6", background:rowBg }}>
                        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                          {["", "入金済み", "未入金"].map(opt => (
                            <button key={opt}
                              onClick={() => onUpdate(order.id, "paymentStatus", opt)}
                              style={{
                                padding:"4px 8px", borderRadius:6, border:"1.5px solid", cursor:"pointer",
                                fontSize:11, fontWeight:700, whiteSpace:"nowrap",
                                borderColor: order.paymentStatus===opt
                                  ? (opt==="入金済み" ? "#1a7a50" : opt==="未入金" ? "#e05050" : "#dde4ef")
                                  : "#dde4ef",
                                background: order.paymentStatus===opt
                                  ? (opt==="入金済み" ? "#1a7a50" : opt==="未入金" ? "#e05050" : "#f5f7fa")
                                  : "#fff",
                                color: order.paymentStatus===opt
                                  ? (opt ? "#fff" : "#8a95a5")
                                  : (opt==="入金済み" ? "#1a7a50" : opt==="未入金" ? "#e05050" : "#aab"),
                              }}>
                              {opt || "—"}
                            </button>
                          ))}
                        </div>
                      </td>
                    )}
                    {isFirst && (
                      <td rowSpan={rowCount} style={{ padding:"6px 8px", verticalAlign:"top",
                        borderLeft:"1px solid #edf0f6", background:rowBg }}>
                        <input
                          type="date"
                          value={order.paymentDate||""}
                          onChange={e => onUpdate(order.id, "paymentDate", e.target.value)}
                          style={{ width:"100%", padding:"4px 6px", borderRadius:6,
                            border:"1.5px solid #dde4ef", fontSize:11, outline:"none",
                            background:"#fff", cursor:"pointer", color:"#1a2a3a" }}
                        />
                        {order.paymentDate && (
                          <div style={{ fontSize:10.5, color:"#1a7a50", fontWeight:700, marginTop:3, textAlign:"center" }}>
                            {order.paymentDate.slice(5).replace("-","/")}
                          </div>
                        )}
                      </td>
                    )}
                    {/* 出荷指示セル（商品単位・数量入力・取消対応） */}
                    {(() => {
                      const instrKey = `${order.id}_${pi}`;
                      const instructions = (order.shipInstructions||[]).filter(i => i.productName === p.name);
                      const [showForm, setShowForm] = React.useState(false);
                      const [inputQty, setInputQty] = React.useState("");
                      const unit = p.unit || "";

                      const handleConfirm = () => {
                        if (!inputQty.trim()) return;
                        const now = new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"});
                        const id = Date.now();
                        const updated = [...(order.shipInstructions||[]), { id, productName: p.name, qty: inputQty, unit, instructedAt: now }];
                        onUpdate(order.id, "shipInstructions", updated);
                        setInputQty(""); setShowForm(false);
                      };

                      const handleCancel = (instrId) => {
                        const updated = (order.shipInstructions||[]).filter(i => i.id !== instrId);
                        onUpdate(order.id, "shipInstructions", updated);
                      };

                      return (
                        <td style={{ padding:"6px 8px", borderLeft:"1px solid #edf0f6", background:rowBg, verticalAlign:"top" }}>
                          {/* 指示履歴一覧 */}
                          {instructions.length > 0 && (
                            <div style={{ marginBottom:4 }}>
                              {instructions.map((instr, idx) => (
                                <div key={instr.id||idx} style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between",
                                  background:"#f0fdf6", border:"1px solid #b8e8cc", borderRadius:5,
                                  padding:"3px 5px", marginBottom:3, gap:4 }}>
                                  <div>
                                    <div style={{ fontSize:10, fontWeight:700, color:"#1a7a50" }}>
                                      📤 {instr.qty}{instr.unit}
                                    </div>
                                    <div style={{ fontSize:9.5, color:"#8a95a5" }}>{instr.instructedAt}</div>
                                  </div>
                                  <button onClick={() => handleCancel(instr.id||idx)}
                                    title="取消"
                                    style={{ border:"none", background:"none", color:"#e05050",
                                      fontSize:12, cursor:"pointer", padding:"0 2px", lineHeight:1, flexShrink:0 }}>
                                    ✕
                                  </button>
                                </div>
                              ))}
                            </div>
                          )}
                          {/* 入力フォーム */}
                          {showForm ? (
                            <div style={{ background:"#fffbef", border:"1px solid #e8c95a", borderRadius:6, padding:"5px" }}>
                              <div style={{ fontSize:10, color:"#7a6020", marginBottom:3, fontWeight:700 }}>出荷数量</div>
                              <div style={{ display:"flex", gap:3, alignItems:"center", marginBottom:4 }}>
                                <input
                                  type="number" min="1"
                                  value={inputQty}
                                  onChange={e => setInputQty(e.target.value)}
                                  onKeyDown={e => e.key==="Enter" && handleConfirm()}
                                  placeholder="数量"
                                  autoFocus
                                  style={{ width:"55px", padding:"3px 5px", borderRadius:5,
                                    border:"1.5px solid #e8c95a", fontSize:11, outline:"none" }}
                                />
                                <span style={{ fontSize:10, color:"#7a6020" }}>{unit}</span>
                              </div>
                              <div style={{ display:"flex", gap:3 }}>
                                <button onClick={handleConfirm}
                                  style={{ flex:2, padding:"4px 0", borderRadius:5, border:"none",
                                    background:"#e07d20", color:"#fff", fontSize:10, fontWeight:700, cursor:"pointer" }}>
                                  確定
                                </button>
                                <button onClick={() => { setShowForm(false); setInputQty(""); }}
                                  style={{ flex:1, padding:"4px 0", borderRadius:5,
                                    border:"1.5px solid #dde4ef", background:"#fff",
                                    color:"#888", fontSize:10, cursor:"pointer" }}>
                                  戻る
                                </button>
                              </div>
                            </div>
                          ) : (
                            <button onClick={() => setShowForm(true)}
                              style={{ width:"100%", padding:"4px 0", borderRadius:6,
                                border:"1.5px solid #e07d20", background:"#fff8f0",
                                color:"#e07d20", fontSize:10.5, fontWeight:700, cursor:"pointer" }}>
                              {instructions.length > 0 ? "📤 再指示" : "📤 出荷指示"}
                            </button>
                          )}
                        </td>
                      );
                    })()}
                  </tr>
                );
              })
            )}
          </tbody>
        </table>
      </div>

      <div style={{ fontSize:11, color:"#c0c8d4", marginTop:6, textAlign:"right" }}>
        {filtered.length}注文 / {allP.length}商品
      </div>
    </div>
  );
}


// ── リクエスト管理 ────────────────────────────────────────────────────────
function RequestManager(props) {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [replyText, setReplyText] = useState({});
  const [replying, setReplying] = useState({});
  const [replyDone, setReplyDone] = useState({});

  const waitFB = async () => { let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;} };

  useEffect(() => {
    const load = async () => {
      await waitFB();
      const data = await window._firebase.loadRequests();
      setRequests(data);
      setLoading(false);
      if (props.onUnreadCount) props.onUnreadCount(data.filter(r => r.status !== "replied").length);
      data.filter(r => r.status === "unread").forEach(r => window._firebase.markRequestRead(r.id));
    };
    load();
  }, []);

  const handleReply = async (id) => {
    const text = replyText[id];
    if (!text || !text.trim()) return;
    setReplying(p => ({...p, [id]: true}));
    try {
      await window._firebase.replyRequest(id, text.trim());
      setRequests(prev => prev.map(r => r.id === id ? {...r, reply: text.trim(), status: "replied"} : r));
      setReplyDone(p => ({...p, [id]: true}));
    } catch(e) { alert("送信に失敗しました"); }
    setReplying(p => ({...p, [id]: false}));
  };

  const unread = requests.filter(r => r.status === "unread" || r.status === "read").length;
  const unreplied = requests.filter(r => r.status !== "replied").length;

  if (loading) return <div style={{ textAlign:"center",padding:"40px 0",color:"#8a95a5" }}>読み込み中...</div>;

  return (
    <div>
      {/* サマリー */}
      <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }}>
        <div style={{ background:"#fff",borderRadius:12,border:"1.5px solid #e4eaf3",padding:"12px 18px",flex:1,minWidth:120 }}>
          <div style={{ fontSize:22,fontWeight:900,color:"#e07d20" }}>{unreplied}</div>
          <div style={{ fontSize:11,color:"#8a95a5",marginTop:2 }}>未返信</div>
        </div>
        <div style={{ background:"#fff",borderRadius:12,border:"1.5px solid #e4eaf3",padding:"12px 18px",flex:1,minWidth:120 }}>
          <div style={{ fontSize:22,fontWeight:900,color:"#3aa876" }}>{requests.filter(r=>r.status==="replied").length}</div>
          <div style={{ fontSize:11,color:"#8a95a5",marginTop:2 }}>返信済み</div>
        </div>
        <div style={{ background:"#fff",borderRadius:12,border:"1.5px solid #e4eaf3",padding:"12px 18px",flex:1,minWidth:120 }}>
          <div style={{ fontSize:22,fontWeight:900,color:"#6b8cba" }}>{requests.length}</div>
          <div style={{ fontSize:11,color:"#8a95a5",marginTop:2 }}>合計</div>
        </div>
      </div>

      {requests.length === 0 && (
        <div style={{ textAlign:"center",padding:"48px 0",color:"#8a95a5" }}>
          <div style={{ fontSize:32,marginBottom:12 }}>📭</div>
          <div style={{ fontSize:14 }}>リクエストはまだありません</div>
        </div>
      )}

      {requests.map(r => (
        <div key={r.id} style={{ background:"#fff",borderRadius:14,border:`1.5px solid ${r.status==="replied"?"#c0d0e8":"#f0c090"}`,marginBottom:12,overflow:"hidden",boxShadow:"0 1px 8px rgba(10,30,53,0.05)",borderLeft:`4px solid ${r.status==="replied"?"#3aa876":"#e07d20"}` }}>
          <div style={{ padding:"14px 16px" }}>
            {/* ヘッダー */}
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10 }}>
              <div>
                <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap" }}>
                  <span style={{ fontSize:15,fontWeight:900,color:"#0f2744" }}>{r.orderId}</span>
                  <span style={{ padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,
                    background:r.status==="replied"?"#e8f0fa":"#fff8e8",
                    color:r.status==="replied"?"#0f2744":"#b87f0a",
                    border:r.status==="replied"?"1px solid #c0d0e8":"1px solid #e8c95a" }}>
                    {r.status==="replied"?"✅ 返信済み":"🚨 未返信"}
                  </span>
                </div>
                <div style={{ fontSize:11.5,color:"#8a95a5" }}>{r.clinic}　{r.email}</div>
              </div>
              <div style={{ fontSize:11,color:"#a0aab8",textAlign:"right" }}>{r.createdAt}</div>
            </div>
            {/* リクエスト内容 */}
            <div style={{ padding:"10px 14px",background:"#fff8f0",borderRadius:9,border:"1px solid #f0c090",fontSize:13,color:"#5a3010",marginBottom:10 }}>
              📬 {r.message}
            </div>
            {/* 返信済みの場合 */}
            {r.reply && (
              <div style={{ padding:"10px 14px",background:"#f0f6ff",borderRadius:9,border:"1px solid #d0e0f4",fontSize:13,color:"#1a3a5c",marginBottom:4 }}>
                💬 {r.reply}
              </div>
            )}
            {r.repliedAt && <div style={{ fontSize:11,color:"#a0aab8",marginBottom:8,textAlign:"right" }}>返信日時：{r.repliedAt}</div>}
            {/* 返信フォーム */}
            {r.status !== "replied" && !replyDone[r.id] && (
              <div style={{ marginTop:8 }}>
                <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>返信メッセージを入力</div>
                <textarea
                  value={replyText[r.id]||""}
                  onChange={e=>setReplyText(p=>({...p,[r.id]:e.target.value}))}
                  placeholder="例：〇〇の商品は現在通関中で、約3〜5日でお届け予定です。"
                  rows={3}
                  style={{ width:"100%",padding:"10px 12px",borderRadius:9,border:"1.5px solid #dde4ef",fontSize:13,outline:"none",resize:"vertical",boxSizing:"border-box",marginBottom:8 }}
                />
                <button onClick={()=>handleReply(r.id)} disabled={replying[r.id]}
                  style={{ width:"100%",padding:"11px",borderRadius:9,border:"none",background:"#0f2744",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",opacity:replying[r.id]?0.7:1 }}>
                  {replying[r.id]?"送信中...":"返信を送る"}
                </button>
              </div>
            )}
            {replyDone[r.id] && (
              <div style={{ padding:"10px",background:"#f0fdf6",borderRadius:9,border:"1px solid #a0d8b8",fontSize:13,color:"#1a7a50",fontWeight:600,textAlign:"center" }}>
                ✅ 返信を送信しました
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── メインApp ─────────────────────────────────────────────────────────────
function App() {
  const [authed,setAuthed]=useState(false);
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showCsv,setShowCsv]=useState(false);
  const [saveStatus,setSaveStatus]=useState("");
  const [groupMode,setGroupMode]=useState("month");
  const [search,setSearch]=useState("");
  const [importMsg,setImportMsg]=useState("");
  const [tab,setTab]=useState("orders"); // "orders" | "accounts" | "requests"
  const [unreadCount,setUnreadCount]=useState(0);

  useEffect(()=>{
    if(!authed) return;
    const load=async()=>{
      let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;}
      try{ const data=await window._firebase.loadOrders(); setOrders(data||[]); }catch(e){ console.error(e); }
      setLoading(false);
    };
    load();
  },[authed]);

  const updateOrder=(id,field,value)=>setOrders(prev=>prev.map(o=>o.id===id?{...o,[field]:value,updatedAt:nowStr()}:o));
  const deleteOrder=(id)=>setOrders(prev=>prev.filter(o=>o.id!==id));
  const handleImport=(newOrders)=>{
    setOrders(prev=>{ const map={}; prev.forEach(o=>map[o.id]=o); newOrders.forEach(o=>map[o.id]=o); return Object.values(map).sort((a,b)=>b.id.localeCompare(a.id)); });
    setImportMsg(`✅ ${newOrders.length}件をインポートしました。「Firebaseに保存」を押してください。`);
    setTimeout(()=>setImportMsg(""),6000);
  };
  const handleSave=async()=>{
    setSaveStatus("saving");
    try{ await window._firebase.saveOrders(orders); setSaveStatus("saved"); }catch(e){ setSaveStatus("error"); }
    setTimeout(()=>setSaveStatus(""),3000);
  };

  const filtered=orders.filter(o=>!search||o.id.includes(search)||o.clinic.includes(search)||o.products.some(p=>p.name.includes(search)));
  const grouped=groupMode==="month"?groupBy(filtered,o=>toMonthKey(o.date)):groupBy(filtered,o=>o.clinic||"不明");
  const keys=Object.keys(grouped).sort((a,b)=>groupMode==="month"?b.localeCompare(a):a.localeCompare(b));
  const allP=orders.flatMap(o=>o.products);
  const activeP=allP.filter(p=>p.status<6).length;
  const cnt=STATUS_STAGES.reduce((a,s)=>{a[s.id]=allP.filter(p=>p.status===s.id).length;return a;},{});

  if(!authed) return <LoginScreen onLogin={()=>setAuthed(true)}/>;

  return (
    <div style={{ minHeight:"100vh",background:"#f0f4f9" }}>
      {showCsv&&<CsvImportModal onImport={handleImport} onClose={()=>setShowCsv(false)}/>}

      {/* トップバー */}
      <div style={{ background:"linear-gradient(135deg,#0a1e35,#0f2744)",padding:"18px 18px 20px",position:"sticky",top:0,zIndex:50 }}>
        <div style={{ maxWidth:1200,margin:"0 auto" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14 }}>
            <div>
              <div style={{ fontSize:11,letterSpacing:"0.18em",color:"#d4a843",fontWeight:700,marginBottom:3 }}>ADMIN</div>
              <div style={{ fontSize:17,fontWeight:900,color:"#fff" }}>輸入状況 管理ダッシュボード</div>
            </div>
            {tab==="orders"&&(
              <div style={{ display:"flex",gap:8 }}>
                <button onClick={()=>setShowCsv(true)} style={{ padding:"9px 14px",borderRadius:9,border:"1.5px solid rgba(100,200,150,0.6)",background:"transparent",color:"#7df0b0",fontWeight:700,fontSize:13,cursor:"pointer" }}>📂 CSV取込</button>
                <button onClick={handleSave} disabled={saveStatus==="saving"} style={{ padding:"9px 16px",borderRadius:9,border:"none",background:saveStatus==="saved"?"#3aa876":saveStatus==="error"?"#e05050":"#d4a843",color:"#0a1e35",fontWeight:800,fontSize:13,cursor:"pointer" }}>
                  {saveStatus==="saving"?"保存中...":saveStatus==="saved"?"✓ 保存済み":saveStatus==="error"?"エラー":"Firebaseに保存"}
                </button>
              </div>
            )}
          </div>
          {/* サマリー */}
          <div style={{ display:"flex",gap:7,overflowX:"auto",paddingBottom:2,marginBottom:14 }}>
            {[{l:"対応中商品",v:activeP,c:"#d4a843"},{l:"通関待ち",v:cnt[4]||0,c:"#e07d20"},{l:"配送中",v:cnt[5]||0,c:"#3aa876"},{l:"完了商品",v:cnt[6]||0,c:"#6b8cba"},{l:"全注文",v:orders.length,c:"#8a9ab5"}].map(s=>(
              <div key={s.l} style={{ background:"rgba(255,255,255,0.09)",borderRadius:10,padding:"7px 13px",flexShrink:0,border:`1px solid ${s.c}30` }}>
                <div style={{ fontSize:18,fontWeight:900,color:s.c }}>{s.v}</div>
                <div style={{ fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:1 }}>{s.l}</div>
              </div>
            ))}
          </div>
          {/* タブ */}
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:3 }}>
            {[["orders","📦 注文管理"],["status","📊 ステータス管理"],["requests", unreadCount > 0 ? `📬 リクエスト ${unreadCount}件` : "📬 リクエスト"],["accounts","👤 クリニック管理"]].map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)} style={{ padding:"9px 8px",borderRadius:8,border:"none",background:tab===key?"#fff":"rgba(255,255,255,0.08)",color:tab===key?"#0f2744":"rgba(255,255,255,0.7)",fontWeight:tab===key?700:500,fontSize:12.5,cursor:"pointer",transition:"all 0.2s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis" }}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth:1200,margin:"0 auto",padding:"18px 14px 48px" }}>

        {tab==="accounts" && <ClinicAccountManager />}
        {tab==="requests" && <RequestManager onUnreadCount={setUnreadCount}/>}
        {tab==="status" && <StatusManager orders={orders} onUpdate={updateOrder} />}

        {tab==="orders" && (
          <>
            {loading&&<div style={{ textAlign:"center",padding:"60px 0",color:"#8a95a5" }}><div style={{ fontSize:32,marginBottom:12 }}>🔄</div><div style={{ fontSize:14 }}>データを読み込み中...</div></div>}
            {!loading&&importMsg&&<div style={{ padding:"11px 16px",background:"#f0fdf6",border:"1.5px solid #3aa876",borderRadius:10,fontSize:13,fontWeight:700,color:"#1a7a50",marginBottom:14 }}>{importMsg}</div>}
            {!loading&&(
              <>
                <div style={{ display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center" }}>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="注文番号・クリニック・商品名で検索"
                    style={{ flex:1,minWidth:160,padding:"10px 14px",borderRadius:10,border:"1.5px solid #dde4ef",fontSize:13,outline:"none",background:"#fff",color:"#0f2744" }}/>
                  <div style={{ display:"flex",background:"#fff",borderRadius:10,border:"1.5px solid #dde4ef",overflow:"hidden" }}>
                    {[["month","📅 月別"],["clinic","🏥 クリニック別"]].map(([k,l])=>(
                      <button key={k} onClick={()=>setGroupMode(k)} style={{ padding:"9px 13px",border:"none",background:groupMode===k?"#0f2744":"transparent",color:groupMode===k?"#fff":"#6a7a8a",fontWeight:groupMode===k?700:500,fontSize:12.5,cursor:"pointer",whiteSpace:"nowrap" }}>{l}</button>
                    ))}
                  </div>
                </div>
                {orders.length===0&&<div style={{ textAlign:"center",padding:"48px 0",color:"#8a95a5" }}><div style={{ fontSize:32,marginBottom:12 }}>📭</div><div style={{ fontSize:14,marginBottom:8 }}>まだ注文データがありません</div><div style={{ fontSize:12.5 }}>「📂 CSV取込」でbcartのデータを読み込んでください</div></div>}
                {keys.map((k,i)=><GroupSection key={k} title={k} orders={grouped[k]} onUpdate={updateOrder} onDelete={deleteOrder} defaultOpen={i===0}/>)}
                {orders.length>0&&<div style={{ textAlign:"center",fontSize:12,color:"#c0c8d4",marginTop:8 }}>{filtered.length}件表示（全{orders.length}件）</div>}
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
