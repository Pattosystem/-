<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輸入状況確認システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNg5KsLABnwJbN5EpvWjpLnkstFzXA1HE",
    authDomain: "order-tracking-92681.firebaseapp.com",
    projectId: "order-tracking-92681",
    storageBucket: "order-tracking-92681.firebasestorage.app",
    messagingSenderId: "988787355455",
    appId: "1:988787355455:web:c7ce248d9fe2178636ed8a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  window._firebase = {
    signIn: (email, pw) => signInWithEmailAndPassword(auth, email, pw),
    signOut: () => signOut(auth),
    onAuthStateChanged: (cb) => onAuthStateChanged(auth, cb),
    resetPassword: (email) => sendPasswordResetEmail(auth, email),
    loadOrders: async () => {
      try {
        // 月別分割形式で読込
        const indexDoc = await getDoc(doc(db, "appdata", "orders_index"));
        if (indexDoc.exists()) {
          const months = indexDoc.data().months || [];
          const all = [];
          for (const m of months) {
            const d = await getDoc(doc(db, "appdata", "orders_" + m));
            if (d.exists()) all.push(...(d.data().list || []));
          }
          return all;
        }
        return [];
      } catch(e) {
        console.error("loadOrders error:", e);
        return [];
      }
    },
    loadBindings: async () => {
      try {
        const d = await getDoc(doc(db, "appdata", "bindings"));
        return d.exists() ? d.data().data || {} : {};
      } catch(e) { return {}; }
    },
    sendRequest: async (orderId, clinic, email, message) => {
      const id = `${orderId}_${Date.now()}`;
      await setDoc(doc(db, "requests", id), {
        id, orderId, clinic, email, message,
        status: "unread",
        reply: "",
        createdAt: new Date().toLocaleString("ja-JP", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}),
        repliedAt: ""
      });
      return true;
    },
    loadMyRequests: async (email) => {
      const snap = await getDocs(collection(db, "requests"));
      const list = [];
      snap.forEach(d => { const r = d.data(); if (r.email === email) list.push(r); });
      return list.sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    }
  };
</script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#f0f4f9; font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STATUS_STAGES = [
  { id:0, label:"注文受付済み",        icon:"📋", color:"#8a9ab5", short:"受付済" },
  { id:1, label:"海外発送準備中",       icon:"📦", color:"#6b8cba", short:"準備中" },
  { id:2, label:"輸出国空港到着",       icon:"✈️", color:"#4a7cc7", short:"空港到着" },
  { id:3, label:"日本へ航空輸送中",     icon:"🌏", color:"#d4a843", short:"輸送中" },
  { id:4, label:"日本空港・通関待ち",   icon:"🛂", color:"#e07d20", short:"通関待ち" },
  { id:5, label:"通関完了・国内配送中", icon:"🚚", color:"#3aa876", short:"配送中" },
  { id:6, label:"お届け完了",           icon:"✅", color:"#0f2744", short:"完了" },
  { id:7, label:"一部発送済み",         icon:"🔶", color:"#e07d20", short:"一部発送済" },
];

const GROUP_DEFS = [
  { label:"🚚 もうすぐ到着・配送中", ids:[4,5],  bg:"#f0fdf6", border:"#3aa876", text:"#1a7a50" },
  { label:"🔶 一部発送済み",          ids:[7],    bg:"#fff8f0", border:"#e07d20", text:"#a04010" },
  { label:"🌏 輸送中",                ids:[2,3],  bg:"#fffbef", border:"#d4a843", text:"#8a6010" },
  { label:"📦 準備中",                ids:[0,1],  bg:"#f4f6fb", border:"#6b8cba", text:"#3a5080" },
  { label:"✅ お届け済み",            ids:[6],    bg:"#f4f7fa", border:"#c0cdd8", text:"#607080" },
];

// ── ログイン ──────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [showReset, setShowReset] = useState(false);
  const [resetDone, setResetDone] = useState(false);

  const waitFB = async () => { let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;} };

  const handleLogin = async () => {
    if (!email||!pw) { setError("メールアドレスとパスワードを入力してください"); return; }
    setLoading(true); setError("");
    await waitFB();
    try { await window._firebase.signIn(email, pw); }
    catch(e) {
      const c=e.code||"";
      if(c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found")) setError("メールアドレスまたはパスワードが正しくありません");
      else if(c.includes("too-many-requests")) setError("試行回数が多すぎます。しばらく待ってからお試しください");
      else setError("ログインに失敗しました");
      setLoading(false);
    }
  };

  const handleReset = async () => {
    if (!email) { setError("メールアドレスを入力してください"); return; }
    await waitFB();
    try { await window._firebase.resetPassword(email); setResetDone(true); setError(""); }
    catch(e) { setError("送信に失敗しました。メールアドレスを確認してください"); }
  };

  const inp = { width:"100%",padding:"13px 14px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:15,outline:"none" };

  return (
    <div style={{ minHeight:"100vh",background:"linear-gradient(160deg,#0a1e35 0%,#0f2744 55%,#1a3d6e 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20 }}>
      <div style={{ width:"100%",maxWidth:380 }}>
        <div style={{ textAlign:"center",marginBottom:32 }}>
          <div style={{ fontSize:10.5,letterSpacing:"0.2em",color:"#d4a843",fontWeight:700,marginBottom:8,textTransform:"uppercase" }}>Import Status Tracking</div>
          <div style={{ fontSize:24,fontWeight:900,color:"#fff",lineHeight:1.3,marginBottom:8 }}>輸入状況<br/>確認システム</div>
          <div style={{ fontSize:12.5,color:"rgba(255,255,255,0.5)",lineHeight:1.7 }}>ご注文の輸入状況をご確認いただけます</div>
        </div>
        <div style={{ background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:16,padding:"28px 24px" }}>
          <div style={{ fontSize:15,fontWeight:800,color:"#fff",marginBottom:20 }}>{showReset?"パスワードをリセット":"ログイン"}</div>
          {resetDone ? (
            <div style={{ padding:16,background:"rgba(58,168,118,0.15)",border:"1px solid rgba(58,168,118,0.4)",borderRadius:10,color:"#7df0b0",fontSize:13,lineHeight:1.7,textAlign:"center" }}>
              ✅ パスワードリセットメールを送信しました。
              <div onClick={()=>{setShowReset(false);setResetDone(false);}} style={{ marginTop:12,color:"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer",textDecoration:"underline" }}>ログイン画面に戻る</div>
            </div>
          ) : (
            <>
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:11.5,color:"rgba(255,255,255,0.6)",marginBottom:6 }}>メールアドレス</div>
                <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&!showReset&&handleLogin()} placeholder="clinic@example.com" style={inp}/>
              </div>
              {!showReset&&(
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:11.5,color:"rgba(255,255,255,0.6)",marginBottom:6 }}>パスワード</div>
                  <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••" style={inp}/>
                </div>
              )}
              {error&&<div style={{ padding:"10px 12px",background:"rgba(220,50,50,0.15)",border:"1px solid rgba(220,50,50,0.3)",borderRadius:8,color:"#ff9090",fontSize:12.5,marginBottom:14 }}>⚠ {error}</div>}
              {showReset
                ? <button onClick={handleReset} style={{ width:"100%",padding:14,borderRadius:10,border:"none",background:"#d4a843",color:"#0a1e35",fontWeight:800,fontSize:14,cursor:"pointer" }}>リセットメールを送信</button>
                : <button onClick={handleLogin} disabled={loading} style={{ width:"100%",padding:14,borderRadius:10,border:"none",background:"#d4a843",color:"#0a1e35",fontWeight:800,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>{loading?"ログイン中...":"ログイン"}</button>
              }
              <div onClick={()=>{setShowReset(!showReset);setError("");}} style={{ marginTop:14,textAlign:"center",color:"rgba(255,255,255,0.5)",fontSize:12.5,cursor:"pointer",textDecoration:"underline" }}>
                {showReset?"ログイン画面に戻る":"パスワードを忘れた方はこちら"}
              </div>
            </>
          )}
        </div>
        <div style={{ textAlign:"center",marginTop:16,fontSize:11.5,color:"rgba(255,255,255,0.3)",lineHeight:1.7 }}>アカウントをお持ちでない方は<br/>担当者までお問い合わせください</div>
      </div>
    </div>
  );
}

// ── 商品行 ────────────────────────────────────────────────────────────────
function ProductRow({ product, index }) {
  const [open, setOpen] = useState(false);
  const s = STATUS_STAGES[product.status];
  return (
    <div style={{ borderBottom:"1px solid #f0f4f9" }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ display:"flex",alignItems:"center",padding:"11px 14px",cursor:"pointer",gap:10,background:open?"#f8fafd":"#fff" }}>
        <div style={{ width:22,height:22,borderRadius:6,background:"#f0f4ff",color:"#4a7cc7",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>{index+1}</div>
        <div style={{ flex:1,minWidth:0 }}>
          <div style={{ fontSize:13,fontWeight:600,color:"#1a2a3a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:open?"normal":"nowrap" }}>{product.name}</div>
          {!open&&(
            <div style={{ display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap" }}>
              <span style={{ fontSize:11,color:"#8a95a5" }}>{product.qty}</span>
              <span style={{ width:3,height:3,borderRadius:"50%",background:"#d0d8e4" }}/>
              <span style={{ fontSize:11,fontWeight:700,color:s.color }}>{s.icon} {s.short}</span>
              {product.deliveryInfo&&<span style={{ fontSize:11,color:"#e07d20",fontWeight:700,background:"#fff8f0",padding:"2px 7px",borderRadius:6,border:"1px solid #f0c090" }}>{product.deliveryInfo}</span>}
              {product.eta&&product.eta!=="—"&&product.status<6&&product.status!==7&&<><span style={{ width:3,height:3,borderRadius:"50%",background:"#d0d8e4" }}/><span style={{ fontSize:11,color:"#8a95a5" }}>{product.eta}</span></>}
            </div>
          )}
        </div>
        <div style={{ flexShrink:0,padding:"4px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:s.color+"18",color:s.color,border:`1px solid ${s.color}35`,whiteSpace:"nowrap" }}>{s.icon} {s.short}</div>
        <div style={{ fontSize:14,color:"#c0c8d4",flexShrink:0,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s" }}>⌄</div>
      </div>
      {open&&(
        <div style={{ padding:"12px 14px 14px 48px",background:"#f8fafd",borderTop:"1px solid #edf0f6" }}>
          <div style={{ display:"grid",gridTemplateColumns:"auto 1fr",gap:"6px 14px",fontSize:12.5,marginBottom: product.deliveryRecords&&product.deliveryRecords.length>0?12:0 }}>
            <span style={{ color:"#8a95a5" }}>数量</span><span style={{ color:"#1a2a3a",fontWeight:600 }}>{product.qty}</span>
            <span style={{ color:"#8a95a5" }}>ステータス</span><span style={{ color:s.color,fontWeight:700 }}>{s.icon} {s.label}</span>
            {product.deliveryInfo&&<><span style={{ color:"#8a95a5" }}>納品状況</span><span style={{ color:"#e07d20",fontWeight:700 }}>{product.deliveryInfo}</span></>}
            {product.eta&&product.eta!=="—"&&product.status<6&&product.status!==7&&<><span style={{ color:"#8a95a5" }}>お届け目安</span><span style={{ color:"#1a2a3a",fontWeight:700 }}>{product.eta}</span></>}
            {product.note&&<><span style={{ color:"#8a95a5" }}>備考</span><span style={{ color:"#5a6a7a",lineHeight:1.5 }}>{product.note}</span></>}
          </div>
          {product.deliveryRecords&&product.deliveryRecords.length>0&&(
            <div style={{ padding:"10px 12px",background:"#fff8f0",borderRadius:9,border:"1px solid #f0c090" }}>
              <div style={{ fontSize:11,color:"#a04010",fontWeight:700,marginBottom:8 }}>🔶 分納履歴</div>
              {product.deliveryRecords.map((r,i)=>(
                <div key={i} style={{ display:"flex",alignItems:"center",gap:8,marginBottom:i<product.deliveryRecords.length-1?6:0,fontSize:12 }}>
                  <span style={{ padding:"2px 7px",borderRadius:5,background:r.status==="発送済"?"#e8f4ee":"#f4f6fb",color:r.status==="発送済"?"#1a7a50":"#6a7a8a",fontWeight:700,fontSize:11,flexShrink:0 }}>
                    {r.status==="発送済"?"✅ 納品済":"📋 未発送"}
                  </span>
                  <span style={{ color:"#1a2a3a",fontWeight:600 }}>{r.qty}{r.unit}</span>
                  {r.delivDate&&<span style={{ color:"#8a95a5" }}>納品日：{r.delivDate}</span>}
                  {!r.delivDate&&r.shipDate&&<span style={{ color:"#8a95a5" }}>発送日：{r.shipDate}</span>}
                  {!r.delivDate&&!r.shipDate&&r.status!=="発送済"&&<span style={{ color:"#a0aab8" }}>未発送</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── グループ別商品リスト ──────────────────────────────────────────────────
function GroupedProductList({ products }) {
  const [openGroups, setOpenGroups] = useState({0:true,1:true,2:true,3:false});
  const done=products.filter(p=>p.status===6).length;
  const partial=products.filter(p=>p.status===7).length;
  const soon=products.filter(p=>p.status>=4&&p.status<6).length;
  const trans=products.filter(p=>p.status>=2&&p.status<4).length;
  const prep=products.filter(p=>p.status<2).length;
  const chips=[done&&{label:`✅ 完了 ${done}件`,bg:"#e8f4ee",color:"#1a7a50"},partial&&{label:`🔶 一部発送済み ${partial}件`,bg:"#fff8f0",color:"#a04010"},soon&&{label:`🚚 到着まもなく ${soon}件`,bg:"#fff8e8",color:"#8a6010"},trans&&{label:`🌏 輸送中 ${trans}件`,bg:"#f0f6ff",color:"#2a5090"},prep&&{label:`📦 準備中 ${prep}件`,bg:"#f4f6fb",color:"#4a6080"}].filter(Boolean);
  return (
    <div style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",overflow:"hidden",boxShadow:"0 2px 10px rgba(10,30,53,0.05)" }}>
      <div style={{ display:"flex",gap:6,flexWrap:"wrap",padding:"13px 14px",borderBottom:"1px solid #edf0f6" }}>
        <span style={{ fontSize:12,color:"#8a95a5",alignSelf:"center",marginRight:2 }}>全{products.length}種類：</span>
        {chips.map((c,i)=><span key={i} style={{ padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:c.bg,color:c.color }}>{c.label}</span>)}
      </div>
      {GROUP_DEFS.map((g,gi)=>{
        const items=products.filter(p=>g.ids.includes(p.status));
        if(!items.length) return null;
        const isOpen=openGroups[gi];
        return (
          <div key={gi}>
            <div onClick={()=>setOpenGroups(s=>({...s,[gi]:!s[gi]}))} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",cursor:"pointer",background:g.bg,borderTop:"1.5px solid #edf0f6" }}>
              <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                <span style={{ fontSize:13,fontWeight:800,color:g.text }}>{g.label}</span>
                <span style={{ padding:"2px 8px",borderRadius:20,fontSize:11.5,fontWeight:700,background:"rgba(255,255,255,0.7)",color:g.text,border:`1px solid ${g.border}50` }}>{items.length}件</span>
              </div>
              <div style={{ fontSize:14,color:g.text,opacity:0.6,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.2s" }}>⌄</div>
            </div>
            {isOpen&&items.map((p,i)=><ProductRow key={i} product={p} index={products.indexOf(p)}/>)}
          </div>
        );
      })}
    </div>
  );
}

// ── 急ぎリクエスト ────────────────────────────────────────────────────────
function UrgentRequest({ order, user, myRequests, onSent }) {
  const [open, setOpen] = useState(false);
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);

  // この注文のリクエスト履歴
  const orderRequests = myRequests.filter(r => r.orderId === order.id);

  const handleSend = async () => {
    setSending(true);
    try {
      await window._firebase.sendRequest(
        order.id, order.clinic, user.email,
        "具体的な納期の詳細を希望します"
      );
      setSent(true);
      setOpen(false);
      onSent();
    } catch(e) {
      alert("送信に失敗しました。もう一度お試しください。");
    }
    setSending(false);
  };

  return (
    <div>
      {/* リクエスト履歴（返信あり） */}
      {orderRequests.map((r,i) => (
        <div key={i} style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",padding:"16px 18px",boxShadow:"0 2px 10px rgba(10,30,53,0.05)" }}>
          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}>
            <span style={{ fontSize:13,fontWeight:800,color:"#0f2744" }}>📬 リクエスト送信済み</span>
            <span style={{ fontSize:11,color:"#a0aab8" }}>{r.createdAt}</span>
          </div>
          <div style={{ padding:"10px 14px",background:"#f8fafd",borderRadius:9,fontSize:13,color:"#4a5568",marginBottom: r.reply ? 10 : 0 }}>
            {r.message}
          </div>
          {r.reply ? (
            <div>
              <div style={{ fontSize:11.5,color:"#8a95a5",margin:"10px 0 6px",fontWeight:600 }}>💬 担当者からの返信</div>
              <div style={{ padding:"12px 14px",background:"#f0f6ff",borderRadius:9,border:"1px solid #d0e0f4",fontSize:13,color:"#1a3a5c",lineHeight:1.7 }}>
                {r.reply}
              </div>
              <div style={{ fontSize:11,color:"#a0aab8",marginTop:6,textAlign:"right" }}>返信日時：{r.repliedAt}</div>
            </div>
          ) : (
            <div style={{ padding:"10px 14px",background:"#fffbef",borderRadius:9,border:"1px solid #e8c95a",fontSize:12.5,color:"#7a6020",marginTop:10 }}>
              🕐 担当者が確認中です。しばらくお待ちください。
            </div>
          )}
        </div>
      ))}

      {/* 送信ボタン */}
      {!sent && orderRequests.length === 0 && (
        <div>
          {!open ? (
            <button onClick={()=>setOpen(true)} style={{ width:"100%",padding:"14px",borderRadius:12,border:"2px solid #e07d20",background:"#fff",color:"#e07d20",fontWeight:800,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8 }}>
              🚨 急ぎのリクエストを送る
            </button>
          ) : (
            <div style={{ background:"#fff",borderRadius:14,border:"2px solid #e07d20",padding:"18px",boxShadow:"0 4px 16px rgba(224,125,32,0.15)" }}>
              <div style={{ fontSize:14,fontWeight:800,color:"#e07d20",marginBottom:8 }}>🚨 急ぎのリクエスト</div>
              <div style={{ padding:"12px 14px",background:"#fff8f0",borderRadius:9,border:"1px solid #f0c090",fontSize:13,color:"#5a3010",lineHeight:1.7,marginBottom:14 }}>
                以下の内容で担当者に送信します：<br/>
                <strong>「具体的な納期の詳細を希望します」</strong>
              </div>
              <div style={{ fontSize:12,color:"#8a95a5",marginBottom:14,lineHeight:1.6 }}>
                注文番号：{order.id}　{order.clinic}
              </div>
              <div style={{ display:"flex",gap:8 }}>
                <button onClick={()=>setOpen(false)} style={{ flex:1,padding:"11px",borderRadius:9,border:"1.5px solid #dde4ef",background:"#fff",fontSize:14,cursor:"pointer",color:"#666" }}>キャンセル</button>
                <button onClick={handleSend} disabled={sending} style={{ flex:2,padding:"11px",borderRadius:9,border:"none",background:"#e07d20",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:sending?0.7:1 }}>
                  {sending?"送信中...":"送信する"}
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {sent && (
        <div style={{ padding:"14px 18px",background:"#f0fdf6",border:"1.5px solid #3aa876",borderRadius:12,fontSize:13.5,fontWeight:700,color:"#1a7a50",textAlign:"center" }}>
          ✅ リクエストを送信しました。担当者からの返信をお待ちください。
        </div>
      )}
    </div>
  );
}

// ── メイン画面 ────────────────────────────────────────────────────────────
function MainScreen({ user }) {
  const [orders, setOrders] = useState([]);
  const [myRequests, setMyRequests] = useState([]);
  const [myOrders, setMyOrders] = useState([]); // 紐づけされた自分の注文
  const [loading, setLoading] = useState(true);
  const [query, setQuery] = useState("");
  const [found, setFound] = useState(null);
  const [searched, setSearched] = useState(false);

  const loadData = async () => {
    const [orderData, requestData, bindings] = await Promise.all([
      window._firebase.loadOrders(),
      window._firebase.loadMyRequests(user.email),
      window._firebase.loadBindings(),
    ]);
    setOrders(orderData);
    setMyRequests(requestData);
    // メールアドレスからクリニック名を特定して注文を絞り込む
    // 複数クリニック対応（bindingsの値が配列or文字列どちらでも対応）
    const clinicVal = bindings[user.email];
    const clinicNames = clinicVal
      ? (Array.isArray(clinicVal) ? clinicVal : [clinicVal]).filter(Boolean)
      : [];
    if (clinicNames.length > 0) {
      const filtered = orderData.filter(o => clinicNames.includes(o.clinic));
      filtered.sort((a,b) => b.id.localeCompare(a.id));
      setMyOrders(filtered);
    }
    setLoading(false);
  };

  useEffect(() => { loadData(); }, []);

  const handleSearch = () => {
    const q = query.trim();
    if (!q) return;
    setFound(orders.find(o => o.id === q) || null);
    setSearched(true);
  };

  return (
    <div style={{ minHeight:"100vh",background:"#f0f4f9" }}>
      <div style={{ background:"linear-gradient(160deg,#0a1e35 0%,#0f2744 55%,#1a3d6e 100%)",padding:"28px 20px 36px",position:"relative",overflow:"hidden" }}>
        <div style={{ position:"absolute",top:-50,right:-50,width:200,height:200,borderRadius:"50%",background:"rgba(212,168,67,0.06)",pointerEvents:"none" }}/>
        <div style={{ maxWidth:520,margin:"0 auto",position:"relative" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16 }}>
            <div>
              <div style={{ fontSize:10.5,letterSpacing:"0.2em",color:"#d4a843",fontWeight:700,marginBottom:4,textTransform:"uppercase" }}>Import Status Tracking</div>
              <div style={{ fontSize:20,fontWeight:900,color:"#fff",lineHeight:1.3 }}>輸入状況確認システム</div>
            </div>
            <button onClick={()=>window._firebase.signOut()} style={{ padding:"7px 14px",borderRadius:8,border:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer" }}>ログアウト</button>
          </div>
          <div style={{ fontSize:11.5,color:"rgba(255,255,255,0.45)",marginBottom:16 }}>ログイン中：{user.email}</div>
          <div style={{ background:"rgba(255,255,255,0.08)",border:"1.5px solid rgba(212,168,67,0.3)",borderRadius:14,padding:14 }}>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.45)",marginBottom:7 }}>注文番号を入力してください</div>
            <div style={{ display:"flex",gap:8 }}>
              <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSearch()} placeholder="注文番号"
                style={{ flex:1,padding:"12px 14px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.1)",color:"#fff",fontSize:15,outline:"none" }}/>
              <button onClick={handleSearch} disabled={loading} style={{ padding:"12px 20px",borderRadius:10,border:"none",background:"#d4a843",color:"#0a1e35",fontWeight:900,fontSize:14,cursor:"pointer",opacity:loading?0.6:1 }}>
                {loading?"読込中":"確認する"}
              </button>
            </div>
          </div>
        </div>
      </div>

      <div style={{ maxWidth:520,margin:"0 auto",padding:"20px 14px 48px" }}>

        {/* 紐づけされた自分の注文を自動表示 */}
        {!searched && myOrders.length > 0 && (
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:13,fontWeight:700,color:"#0f2744",marginBottom:12,display:"flex",alignItems:"center",gap:8 }}>
              <span>📋 ご注文一覧</span>
              <span style={{ fontSize:11,color:"#8a95a5",fontWeight:400 }}>全{myOrders.length}件</span>
            </div>
            {myOrders.map(order => (
              <div key={order.id} onClick={() => { setFound(order); setSearched(true); }}
                style={{ background:"#fff",borderRadius:12,border:"1.5px solid #e4eaf3",padding:"14px 16px",marginBottom:8,cursor:"pointer",boxShadow:"0 1px 6px rgba(10,30,53,0.05)" }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6 }}>
                  <span style={{ fontSize:15,fontWeight:900,color:"#0f2744" }}>{order.id}</span>
                  <span style={{ fontSize:11,color:"#a0aab8" }}>{order.date}</span>
                </div>
                <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
                  {(() => {
                    const done = order.products.filter(p=>p.status===6).length;
                    const partial = order.products.filter(p=>p.status===7).length;
                    const pending = order.products.filter(p=>p.status<6&&p.status!==7).length;
                    return (<>
                      {pending>0&&<span style={{ padding:"3px 8px",borderRadius:20,fontSize:11,fontWeight:700,background:"#fff8e8",color:"#8a6010" }}>📦 未着 {pending}件</span>}
                      {partial>0&&<span style={{ padding:"3px 8px",borderRadius:20,fontSize:11,fontWeight:700,background:"#fff8f0",color:"#a04010" }}>🔶 一部 {partial}件</span>}
                      {done>0&&<span style={{ padding:"3px 8px",borderRadius:20,fontSize:11,fontWeight:700,background:"#e8f4ee",color:"#1a7a50" }}>✅ 完了 {done}件</span>}
                    </>);
                  })()}
                </div>
              </div>
            ))}
          </div>
        )}

        {searched&&!found&&(
          <div style={{ background:"#fff",borderRadius:16,padding:"36px 24px",textAlign:"center",border:"1.5px solid #e4eaf3" }}>
            <div style={{ fontSize:36,marginBottom:10 }}>🔍</div>
            <div style={{ fontSize:15,fontWeight:700,color:"#333",marginBottom:6 }}>注文が見つかりませんでした</div>
            <div style={{ fontSize:13,color:"#888",lineHeight:1.7 }}>注文番号をご確認の上、再度お試しください。<br/>ご不明な点はお電話にてお問い合わせください。</div>
          </div>
        )}
        {found&&(
          <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
            {myOrders.length > 0 && (
              <button onClick={() => { setFound(null); setSearched(false); setQuery(""); }}
                style={{ display:"flex",alignItems:"center",gap:6,padding:"8px 0",background:"none",border:"none",color:"#4a7cc7",fontSize:13,fontWeight:700,cursor:"pointer" }}>
                ← 注文一覧に戻る
              </button>
            )}
            <div style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",padding:"16px 18px",boxShadow:"0 2px 10px rgba(10,30,53,0.05)" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontSize:10.5,color:"#a0aab8",letterSpacing:"0.08em",marginBottom:3 }}>注文番号</div>
                  <div style={{ fontSize:18,fontWeight:900,color:"#0f2744",letterSpacing:"0.04em" }}>{found.id}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:10.5,color:"#a0aab8",marginBottom:3 }}>注文日</div>
                  <div style={{ fontSize:12.5,fontWeight:600,color:"#333" }}>{found.date}</div>
                </div>
              </div>
              <div style={{ marginTop:10,display:"flex",alignItems:"center",justifyContent:"space-between" }}>
                <span style={{ fontSize:12.5,color:"#6a7a8a" }}>{found.clinic}</span>
                <span style={{ fontSize:11,color:"#a0aab8" }}>最終更新：{found.updatedAt}</span>
              </div>
            </div>

            <GroupedProductList products={found.products}/>

            {/* 急ぎリクエスト */}
            <UrgentRequest order={found} user={user} myRequests={myRequests} onSent={loadData}/>

            <div style={{ fontSize:12,color:"#a0aab8",textAlign:"center",lineHeight:1.7,padding:"4px 0 8px" }}>
              ステータスは随時更新されます。<br/>ご不明な点はお電話にてお問い合わせください。
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);

  useEffect(() => {
    const wait = async () => {
      let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;}
      window._firebase.onAuthStateChanged(u => { setUser(u); setAuthReady(true); });
    };
    wait();
  }, []);

  if (!authReady) return (
    <div style={{ minHeight:"100vh",background:"linear-gradient(160deg,#0a1e35,#0f2744)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.5)",fontSize:14 }}>読み込み中...</div>
  );

  return user ? <MainScreen user={user}/> : <LoginScreen/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
