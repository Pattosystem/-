<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輸入状況確認システム</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, getDocsFromServer, onSnapshot, doc, getDoc, setDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, reauthenticateWithCredential, EmailAuthProvider, updatePassword, verifyBeforeUpdateEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNg5KsLABnwJbN5EpvWjpLnkstFzXA1HE",
    authDomain: "order-tracking-92681.firebaseapp.com",
    projectId: "order-tracking-92681",
    storageBucket: "order-tracking-92681.firebasestorage.app",
    messagingSenderId: "988787355455",
    appId: "1:988787355455:web:c7ce248d9fe2178636ed8a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const storage = getStorage(app);

  window._firebase = {
    uploadFiles: async (files, requestId) => {
      const urls = [];
      for (const file of files) {
        const ext = file.name.split('.').pop();
        const path = `requests/${requestId}/${Date.now()}_${file.name}`;
        const storageRef = ref(storage, path);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        urls.push({ name: file.name, url, size: file.size });
      }
      return urls;
    },
    signIn: (email, pw) => signInWithEmailAndPassword(auth, email, pw),
    signOut: () => signOut(auth),
    onAuthStateChanged: (cb) => onAuthStateChanged(auth, cb),
    resetPassword: (email) => sendPasswordResetEmail(auth, email),
    loadOrders: async () => {
      try {
        const snap = await getDocsFromServer(collection(db, "orders"));
        const list = [];
        snap.forEach(d => list.push(d.data()));
        console.log("📦 サーバーから取得:", list.length);
        return list;
      } catch(e) {
        console.error("loadOrders error:", e);
        return [];
      }
    },
    // リアルタイム購読 — 管理画面の更新が即座に反映される
    subscribeOrders: (callback) => {
      let debounceTimer = null;
      return onSnapshot(collection(db, "orders"), { includeMetadataChanges: false }, (snap) => {
        // バッチ書き込み中の連続発火をまとめるためdebounce
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const list = [];
          snap.forEach(d => list.push(d.data()));
          console.log("🔄 リアルタイム更新:", list.length, "件");
          callback(list);
        }, 800);
      }, (error) => {
        console.error("subscribeOrders error:", error);
      });
    },
    loadBindings: async () => {
      try {
        const d = await getDoc(doc(db, "appdata", "bindings"));
        if (!d.exists()) return {};
        const raw = d.data();
        const parseClinics = (val) => {
          if (Array.isArray(val)) return val.filter(Boolean);
          if (typeof val === "string" && val.includes("|")) return val.split("|").filter(Boolean);
          if (typeof val === "string" && val) return [val];
          return [];
        };
        // 新形式: json文字列
        if (raw.json) {
          const list = JSON.parse(raw.json);
          const obj = {};
          list.forEach(item => { if(item.email) obj[item.email] = Array.isArray(item.clinics) ? item.clinics : []; });
          console.log("📂 bindings(json):", JSON.stringify(obj));
          return obj;
        }
        // 旧形式
        if (Array.isArray(raw.list)) {
          const obj = {};
          raw.list.forEach(item => { if(item.email) obj[item.email] = parseClinics(item.clinics); });
          console.log("📂 bindings(list):", JSON.stringify(obj));
          return obj;
        }
        return raw.data || {};
      } catch(e) { console.error("loadBindings error:", e); return {}; }
    },
    sendRequest: async (orderId, clinic, email, message, category, attachments) => {
      const id = `req_${email.replace(/[@.]/g,"_")}_${Date.now()}`;
      await setDoc(doc(db, "requests", id), {
        id, orderId: orderId||"", clinic, email, message,
        category: category || "その他",
        status: "unread",
        progress: "受付待ち",
        reply: "",
        attachments: attachments || [],
        replyAttachments: [],
        createdAt: new Date().toLocaleString("ja-JP", {year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}),
        repliedAt: ""
      });
      return id;
    },
    loadMyRequests: async (email) => {
      const snap = await getDocs(collection(db, "requests"));
      const list = [];
      snap.forEach(d => { const r = d.data(); if (r.email === email) list.push(r); });
      return list.sort((a,b) => b.createdAt.localeCompare(a.createdAt));
    },
    reauth: async (email, password) => {
      const credential = EmailAuthProvider.credential(email, password);
      await reauthenticateWithCredential(auth.currentUser, credential);
    },
    updatePassword: async (newPassword) => {
      await updatePassword(auth.currentUser, newPassword);
    },
    updateEmail: async (newEmail) => {
      await verifyBeforeUpdateEmail(auth.currentUser, newEmail);
    }
  };
</script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#f0f4f9; font-family:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif; height:100vh; overflow:hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── ユーティリティ ────────────────────────────────────────────────────────
const STATUS_STAGES = [
  { id:0, label:"注文受付済み",        icon:"📋", color:"#8a9ab5", short:"受付済" },
  { id:1, label:"海外発送準備中",       icon:"📦", color:"#6b8cba", short:"準備中" },
  { id:2, label:"輸出国空港到着",       icon:"✈️", color:"#4a7cc7", short:"空港到着" },
  { id:3, label:"日本へ航空輸送中",     icon:"🌏", color:"#d4a843", short:"輸送中" },
  { id:4, label:"日本空港・通関待ち",   icon:"🛂", color:"#e07d20", short:"通関待ち" },
  { id:5, label:"通関完了・国内配送中", icon:"🚚", color:"#3aa876", short:"配送中" },
  { id:6, label:"お届け完了",           icon:"✅", color:"#0f2744", short:"完了" },
  { id:7, label:"一部発送済み",         icon:"🔶", color:"#e07d20", short:"一部発送済" },
];
const GROUP_DEFS = [
  { label:"🚚 もうすぐ到着・配送中", ids:[4,5],  bg:"#f0fdf6", border:"#3aa876", text:"#1a7a50" },
  { label:"🔶 一部発送済み",          ids:[7],    bg:"#fff8f0", border:"#e07d20", text:"#a04010" },
  { label:"🌏 輸送中",                ids:[2,3],  bg:"#fffbef", border:"#d4a843", text:"#8a6010" },
  { label:"📦 準備中",                ids:[0,1],  bg:"#f4f6fb", border:"#6b8cba", text:"#3a5080" },
  { label:"✅ お届け済み",            ids:[6],    bg:"#f4f7fa", border:"#c0cdd8", text:"#607080" },
];

function parseJpDate(s) {
  if (!s) return null;
  const m1 = s.match(/(\d{4})年(\d{2})月(\d{2})日/);
  if (m1) return new Date(parseInt(m1[1]), parseInt(m1[2])-1, parseInt(m1[3]));
  const m2 = s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m2) return new Date(parseInt(m2[1]), parseInt(m2[2])-1, parseInt(m2[3]));
  return null;
}
function daysBetween(d1, d2) {
  if (!d1 || !d2) return null;
  return Math.round((d2 - d1) / (1000*60*60*24));
}
function leadTimeLabel(days) {
  if (days === null) return null;
  if (days <= 14) return { text:`${days}日`, color:"#1a7a50", bg:"#e8f4ee" };
  if (days <= 30) return { text:`${days}日`, color:"#4a7cc7", bg:"#e8f0ff" };
  if (days <= 60) return { text:`${days}日`, color:"#d4a843", bg:"#fffbef" };
  return { text:`${days}日`, color:"#e07d20", bg:"#fff8f0" };
}

// ── ログイン ──────────────────────────────────────────────────────────────
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [showReset, setShowReset] = useState(false);
  const [resetDone, setResetDone] = useState(false);
  const waitFB = async () => { let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;} };
  const handleLogin = async () => {
    if (!email||!pw) { setError("メールアドレスとパスワードを入力してください"); return; }
    setLoading(true); setError("");
    await waitFB();
    try { await window._firebase.signIn(email, pw); }
    catch(e) {
      const c=e.code||"";
      if(c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found")) setError("メールアドレスまたはパスワードが正しくありません");
      else if(c.includes("too-many-requests")) setError("試行回数が多すぎます。しばらく待ってからお試しください");
      else setError("ログインに失敗しました");
      setLoading(false);
    }
  };
  const handleReset = async () => {
    if (!email) { setError("メールアドレスを入力してください"); return; }
    await waitFB();
    try { await window._firebase.resetPassword(email); setResetDone(true); setError(""); }
    catch(e) { setError("送信に失敗しました。メールアドレスを確認してください"); }
  };
  const inp = { width:"100%",padding:"13px 14px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:15,outline:"none" };
  return (
    <div style={{ minHeight:"100vh",background:"linear-gradient(160deg,#0a1e35 0%,#0f2744 55%,#1a3d6e 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20 }}>
      <div style={{ width:"100%",maxWidth:380 }}>
        <div style={{ textAlign:"center",marginBottom:32 }}>
          <div style={{ fontSize:10.5,letterSpacing:"0.2em",color:"#d4a843",fontWeight:700,marginBottom:8,textTransform:"uppercase" }}>Import Status Tracking</div>
          <div style={{ fontSize:24,fontWeight:900,color:"#fff",lineHeight:1.3,marginBottom:8 }}>輸入状況<br/>確認システム</div>
          <div style={{ fontSize:12.5,color:"rgba(255,255,255,0.5)",lineHeight:1.7 }}>ご注文の輸入状況をご確認いただけます</div>
        </div>
        <div style={{ background:"rgba(255,255,255,0.07)",border:"1.5px solid rgba(255,255,255,0.12)",borderRadius:16,padding:"28px 24px" }}>
          <div style={{ fontSize:15,fontWeight:800,color:"#fff",marginBottom:20 }}>{showReset?"パスワードをリセット":"ログイン"}</div>
          {resetDone ? (
            <div style={{ padding:16,background:"rgba(58,168,118,0.15)",border:"1px solid rgba(58,168,118,0.4)",borderRadius:10,color:"#7df0b0",fontSize:13,lineHeight:1.7,textAlign:"center" }}>
              ✅ パスワードリセットメールを送信しました。
              <div onClick={()=>{setShowReset(false);setResetDone(false);}} style={{ marginTop:12,color:"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer",textDecoration:"underline" }}>ログイン画面に戻る</div>
            </div>
          ) : (
            <>
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:11.5,color:"rgba(255,255,255,0.6)",marginBottom:6 }}>メールアドレス</div>
                <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&!showReset&&handleLogin()} placeholder="clinic@example.com" style={inp}/>
              </div>
              {!showReset&&(
                <div style={{ marginBottom:16 }}>
                  <div style={{ fontSize:11.5,color:"rgba(255,255,255,0.6)",marginBottom:6 }}>パスワード</div>
                  <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••" style={inp}/>
                </div>
              )}
              {error&&<div style={{ padding:"10px 12px",background:"rgba(220,50,50,0.15)",border:"1px solid rgba(220,50,50,0.3)",borderRadius:8,color:"#ff9090",fontSize:12.5,marginBottom:14 }}>⚠ {error}</div>}
              {showReset
                ? <button onClick={handleReset} style={{ width:"100%",padding:14,borderRadius:10,border:"none",background:"#d4a843",color:"#0a1e35",fontWeight:800,fontSize:14,cursor:"pointer" }}>リセットメールを送信</button>
                : <button onClick={handleLogin} disabled={loading} style={{ width:"100%",padding:14,borderRadius:10,border:"none",background:"#d4a843",color:"#0a1e35",fontWeight:800,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>{loading?"ログイン中...":"ログイン"}</button>
              }
              <div onClick={()=>{setShowReset(!showReset);setError("");}} style={{ marginTop:14,textAlign:"center",color:"rgba(255,255,255,0.5)",fontSize:12.5,cursor:"pointer",textDecoration:"underline" }}>
                {showReset?"ログイン画面に戻る":"パスワードを忘れた方はこちら"}
              </div>
            </>
          )}
        </div>
        <div style={{ textAlign:"center",marginTop:16,fontSize:11.5,color:"rgba(255,255,255,0.3)",lineHeight:1.7 }}>アカウントをお持ちでない方は<br/>担当者までお問い合わせください</div>
      </div>
    </div>
  );
}

// ── グローバルリクエストモーダル ──────────────────────────────────────────
const PROGRESS_STAGES_DEF = [
  { key:"受付待ち", color:"#8a9ab5", bg:"#f4f6fb", icon:"📋" },
  { key:"確認中",  color:"#4a7cc7", bg:"#f0f6ff", icon:"👀" },
  { key:"対応中",  color:"#d4a843", bg:"#fffbef", icon:"🔧" },
  { key:"完了",    color:"#3aa876", bg:"#f0fdf6", icon:"✅" },
];

function GlobalRequestModal({ user, myOrders, myRequests, onSent, onClose }) {
  const [tab, setTab] = useState("new");
  const [category, setCategory] = useState("その他");
  const [relatedOrder, setRelatedOrder] = useState("");
  const [message, setMessage] = useState("");
  const [files, setFiles] = useState([]);
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [uploadProgress, setUploadProgress] = useState("");
  const fileRef = useRef();

  const CATEGORIES = ["納期確認", "商品に関する質問", "注文変更・キャンセル", "請求・支払い", "その他"];

  const clinicOf = (orderId) => myOrders.find(o => o.id === orderId)?.clinic || (myOrders[0]?.clinic || "");

  const handleFileChange = (e) => {
    const selected = Array.from(e.target.files);
    const valid = selected.filter(f => f.size <= 10*1024*1024); // 10MB制限
    if (valid.length < selected.length) alert("10MB以上のファイルは添付できません");
    setFiles(prev => [...prev, ...valid]);
    e.target.value = "";
  };

  const removeFile = (i) => setFiles(prev => prev.filter((_,idx) => idx !== i));

  const fmtSize = (bytes) => bytes < 1024*1024 ? Math.round(bytes/1024)+"KB" : (bytes/1024/1024).toFixed(1)+"MB";

  const handleSend = async () => {
    if (!message.trim()) return;
    setSending(true);
    const clinic = relatedOrder ? clinicOf(relatedOrder) : (myOrders[0]?.clinic || "");
    try {
      // 先にリクエストIDを生成してファイルアップロード
      let attachments = [];
      if (files.length > 0) {
        setUploadProgress("ファイルをアップロード中...");
        const reqId = `req_${user.email.replace(/[@.]/g,"_")}_${Date.now()}`;
        attachments = await window._firebase.uploadFiles(files, reqId);
      }
      setUploadProgress("送信中...");
      await window._firebase.sendRequest(relatedOrder || "", clinic, user.email, message.trim(), category, attachments);
      setSent(true); setMessage(""); setRelatedOrder(""); setCategory("その他"); setFiles([]); setUploadProgress("");
      onSent();
      setTimeout(() => setSent(false), 3000);
    } catch(e) { alert("送信に失敗しました。もう一度お試しください。"); setUploadProgress(""); }
    setSending(false);
  };

  const allRequests = [...myRequests].sort((a,b) => b.createdAt.localeCompare(a.createdAt));

  const tabStyle = (active) => ({
    flex:1, padding:"10px 0", border:"none", cursor:"pointer", fontSize:13, fontWeight:700,
    background: active ? "#fff" : "transparent",
    color: active ? "#0f2744" : "#8a95a5",
    borderBottom: active ? "2px solid #4a7cc7" : "2px solid transparent",
  });

  return (
    <div style={{ position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }}>
      <div onClick={onClose} style={{ position:"absolute",inset:0,background:"rgba(0,0,0,0.5)" }}/>
      <div style={{ position:"relative",width:"100%",maxWidth:520,background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.25)",maxHeight:"90vh",display:"flex",flexDirection:"column" }}>
        {/* ヘッダー */}
        <div style={{ background:"linear-gradient(160deg,#0a1e35,#0f2744)",padding:"18px 20px",flexShrink:0 }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div style={{ fontSize:15,fontWeight:800,color:"#fff" }}>📩 担当者へリクエスト</div>
            <button onClick={onClose} style={{ border:"none",background:"rgba(255,255,255,0.15)",color:"#fff",borderRadius:20,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700 }}>✕ 閉じる</button>
          </div>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:4 }}>{user.email}</div>
        </div>
        {/* タブ */}
        <div style={{ display:"flex",background:"#f8fafd",borderBottom:"1px solid #edf0f6",flexShrink:0 }}>
          <button style={tabStyle(tab==="new")} onClick={()=>setTab("new")}>新規リクエスト</button>
          <button style={tabStyle(tab==="history")} onClick={()=>setTab("history")}>
            履歴
            {allRequests.filter(r=>r.status!=="replied").length > 0 &&
              <span style={{ marginLeft:5,padding:"1px 6px",borderRadius:20,fontSize:10.5,background:"#e07d20",color:"#fff" }}>
                {allRequests.filter(r=>r.status!=="replied").length}
              </span>
            }
          </button>
        </div>

        <div style={{ flex:1,overflowY:"auto",padding:"20px" }}>
          {tab === "new" ? (
            <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
              {/* カテゴリ */}
              <div>
                <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:7,fontWeight:600 }}>カテゴリ</div>
                <div style={{ display:"flex",gap:5,flexWrap:"wrap" }}>
                  {CATEGORIES.map(c => (
                    <button key={c} onClick={()=>setCategory(c)}
                      style={{ padding:"5px 12px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:12,fontWeight:700,
                        borderColor:category===c?"#4a7cc7":"#dde4ef",
                        background:category===c?"#4a7cc7":"#fff",
                        color:category===c?"#fff":"#6a7a8a" }}>
                      {c}
                    </button>
                  ))}
                </div>
              </div>
              {/* 関連注文（任意） */}
              {myOrders.length > 0 && (
                <div>
                  <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:7,fontWeight:600 }}>関連する注文番号（任意）</div>
                  <select value={relatedOrder} onChange={e=>setRelatedOrder(e.target.value)}
                    style={{ width:"100%",padding:"9px 12px",borderRadius:9,border:"1.5px solid #dde4ef",fontSize:13,outline:"none",background:"#fff",color:"#1a2a3a" }}>
                    <option value="">指定なし</option>
                    {myOrders.slice(0,20).map(o => (
                      <option key={o.id} value={o.id}>{o.id}（{o.date}）</option>
                    ))}
                  </select>
                </div>
              )}
              {/* メッセージ */}
              <div>
                <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:7,fontWeight:600 }}>内容 <span style={{ color:"#e05050" }}>*</span></div>
                <textarea value={message} onChange={e=>setMessage(e.target.value)} rows={5}
                  placeholder="ご要望・ご質問・お問い合わせ内容をご記入ください"
                  style={{ width:"100%",padding:"10px 12px",borderRadius:9,border:"1.5px solid #dde4ef",fontSize:13,outline:"none",resize:"vertical",lineHeight:1.7,color:"#1a2a3a" }}/>
              </div>
              {/* ファイル添付 */}
              <div>
                <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:7,fontWeight:600 }}>添付ファイル（任意・10MBまで）</div>
                <input ref={fileRef} type="file" multiple onChange={handleFileChange} style={{ display:"none" }}
                  accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.png,.jpg,.jpeg,.gif,.zip,.csv"/>
                <button onClick={()=>fileRef.current.click()}
                  style={{ padding:"8px 14px",borderRadius:8,border:"1.5px dashed #b0c4de",background:"#f8fafd",fontSize:12.5,cursor:"pointer",color:"#4a7cc7",fontWeight:700,width:"100%" }}>
                  📎 ファイルを選択
                </button>
                {files.length > 0 && (
                  <div style={{ marginTop:8,display:"flex",flexDirection:"column",gap:5 }}>
                    {files.map((f,i) => (
                      <div key={i} style={{ display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#f0f6ff",borderRadius:8,border:"1px solid #d0ddf0" }}>
                        <span style={{ fontSize:14 }}>📄</span>
                        <span style={{ flex:1,fontSize:12,color:"#1a2a3a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{f.name}</span>
                        <span style={{ fontSize:11,color:"#8a95a5",flexShrink:0 }}>{fmtSize(f.size)}</span>
                        <button onClick={()=>removeFile(i)} style={{ border:"none",background:"none",color:"#e05050",fontSize:14,cursor:"pointer",padding:0,flexShrink:0 }}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              {sent && (
                <div style={{ padding:"12px 14px",background:"#f0fdf6",border:"1.5px solid #3aa876",borderRadius:10,fontSize:13,fontWeight:700,color:"#1a7a50",textAlign:"center" }}>
                  ✅ リクエストを送信しました
                </div>
              )}
              <button onClick={handleSend} disabled={sending||!message.trim()}
                style={{ width:"100%",padding:"13px",borderRadius:10,border:"none",background:"#4a7cc7",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:(sending||!message.trim())?0.5:1 }}>
                {sending ? (uploadProgress||"送信中...") : "送信する"}
              </button>
            </div>
          ) : (
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              {allRequests.length === 0 && (
                <div style={{ textAlign:"center",padding:"40px 0",color:"#a0aab8" }}>
                  <div style={{ fontSize:32,marginBottom:8 }}>📭</div>
                  <div style={{ fontSize:13 }}>リクエストはまだありません</div>
                </div>
              )}
              {allRequests.map((r,i) => {
                const prog = PROGRESS_STAGES_DEF.find(s => s.key === (r.progress||"受付待ち")) || PROGRESS_STAGES_DEF[0];
                const progIdx = PROGRESS_STAGES_DEF.findIndex(s => s.key === prog.key);
                return (
                  <div key={i} style={{ background:"#f8fafd",borderRadius:12,border:"1.5px solid #e4eaf3",overflow:"hidden" }}>
                    <div style={{ padding:"10px 14px",borderBottom:"1px solid #edf0f6" }}>
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6 }}>
                        <div style={{ display:"flex",gap:5,flexWrap:"wrap",alignItems:"center" }}>
                          {r.orderId&&<span style={{ fontSize:11,fontWeight:700,color:"#4a7cc7" }}>{r.orderId}</span>}
                          <span style={{ padding:"1px 8px",borderRadius:20,fontSize:10.5,fontWeight:700,background:"#f0f4ff",color:"#4a5568",border:"1px solid #dde4ef" }}>{r.category||"その他"}</span>
                          <span style={{ padding:"1px 8px",borderRadius:20,fontSize:10.5,fontWeight:700,background:prog.bg,color:prog.color,border:`1px solid ${prog.color}40` }}>{prog.icon} {prog.key}</span>
                        </div>
                        <span style={{ fontSize:10,color:"#a0aab8",flexShrink:0,marginLeft:6 }}>{r.createdAt}</span>
                      </div>
                      {/* 進捗バー */}
                      <div style={{ display:"flex",gap:2 }}>
                        {PROGRESS_STAGES_DEF.map((s,si) => (
                          <div key={si} style={{ flex:1,height:3,borderRadius:3,background:si<=progIdx?s.color:"#e4eaf3" }}/>
                        ))}
                      </div>
                    </div>
                    <div style={{ padding:"10px 14px" }}>
                      <div style={{ fontSize:12.5,color:"#4a5568",lineHeight:1.6,marginBottom:r.reply?10:0 }}>{r.message}</div>
                      {r.reply && (
                        <div>
                          <div style={{ fontSize:11,color:"#8a95a5",marginBottom:5,fontWeight:600 }}>💬 担当者からの返信</div>
                          <div style={{ padding:"10px 12px",background:"#f0f6ff",borderRadius:9,border:"1px solid #d0e0f4",fontSize:12.5,color:"#1a3a5c",lineHeight:1.7 }}>{r.reply}</div>
                          <div style={{ fontSize:10,color:"#a0aab8",marginTop:4,textAlign:"right" }}>返信：{r.repliedAt}</div>
                        </div>
                      )}
                      {/* お客様の添付ファイル */}
                      {r.attachments && r.attachments.length > 0 && (
                        <div style={{ marginTop:8 }}>
                          <div style={{ fontSize:11,color:"#8a95a5",marginBottom:4,fontWeight:600 }}>📎 添付ファイル</div>
                          {r.attachments.map((f,fi) => (
                            <a key={fi} href={f.url} target="_blank" rel="noopener noreferrer"
                              style={{ display:"flex",alignItems:"center",gap:6,padding:"5px 9px",background:"#f0f6ff",borderRadius:7,border:"1px solid #d0ddf0",textDecoration:"none",marginBottom:3 }}>
                              <span style={{ fontSize:13 }}>📄</span>
                              <span style={{ fontSize:12,color:"#1a6abf",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{f.name}</span>
                              <span style={{ fontSize:10,color:"#8a95a5",flexShrink:0 }}>↓ DL</span>
                            </a>
                          ))}
                        </div>
                      )}
                      {!r.reply && (
                        <div style={{ padding:"7px 10px",background:"#fffbef",borderRadius:8,border:"1px solid #e8c95a",fontSize:11.5,color:"#7a6020",marginTop:6 }}>
                          🕐 担当者が確認中です
                        </div>
                      )}
                      {/* 担当者の返信添付ファイル */}
                      {r.replyAttachments && r.replyAttachments.length > 0 && (
                        <div style={{ marginTop:8 }}>
                          <div style={{ fontSize:11,color:"#8a95a5",marginBottom:4,fontWeight:600 }}>📎 担当者からの添付ファイル</div>
                          {r.replyAttachments.map((f,fi) => (
                            <a key={fi} href={f.url} target="_blank" rel="noopener noreferrer"
                              style={{ display:"flex",alignItems:"center",gap:6,padding:"5px 9px",background:"#e8f4ee",borderRadius:7,border:"1px solid #b0d8b8",textDecoration:"none",marginBottom:3 }}>
                              <span style={{ fontSize:13 }}>📄</span>
                              <span style={{ fontSize:12,color:"#1a6abf",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>{f.name}</span>
                              <span style={{ fontSize:10,color:"#8a95a5",flexShrink:0 }}>↓ DL</span>
                            </a>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── アカウント設定モーダル ────────────────────────────────────────────────
function AccountSettingsModal({ user, onClose }) {
  const [tab, setTab] = useState("password");
  const [currentPw, setCurrentPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [newPw2, setNewPw2] = useState("");
  const [newEmail, setNewEmail] = useState("");
  const [error, setError] = useState("");
  const [success, setSuccess] = useState("");
  const [loading, setLoading] = useState(false);
  const reset = () => { setCurrentPw(""); setNewPw(""); setNewPw2(""); setNewEmail(""); setError(""); setSuccess(""); };
  const handlePasswordChange = async () => {
    if (!currentPw||!newPw||!newPw2) { setError("すべての項目を入力してください"); return; }
    if (newPw !== newPw2) { setError("新しいパスワードが一致しません"); return; }
    if (newPw.length < 6) { setError("パスワードは6文字以上で設定してください"); return; }
    setLoading(true); setError(""); setSuccess("");
    try {
      await window._firebase.reauth(user.email, currentPw);
      await window._firebase.updatePassword(newPw);
      setSuccess("✅ パスワードを変更しました");
      setCurrentPw(""); setNewPw(""); setNewPw2("");
    } catch(e) {
      const c = e.code||"";
      if (c.includes("wrong-password")||c.includes("invalid-credential")) setError("現在のパスワードが正しくありません");
      else setError("変更に失敗しました。もう一度お試しください");
    }
    setLoading(false);
  };
  const handleEmailChange = async () => {
    if (!currentPw||!newEmail) { setError("すべての項目を入力してください"); return; }
    if (!newEmail.includes("@")) { setError("正しいメールアドレスを入力してください"); return; }
    setLoading(true); setError(""); setSuccess("");
    try {
      await window._firebase.reauth(user.email, currentPw);
      await window._firebase.updateEmail(newEmail);
      setSuccess("✅ 確認メールを送信しました。新しいメールアドレスに届いたリンクをクリックすると変更完了です。");
      setCurrentPw(""); setNewEmail("");
    } catch(e) {
      const c = e.code||"";
      if (c.includes("wrong-password")||c.includes("invalid-credential")) setError("現在のパスワードが正しくありません");
      else if (c.includes("email-already-in-use")) setError("そのメールアドレスは既に使用されています");
      else setError("変更に失敗しました。もう一度お試しください");
    }
    setLoading(false);
  };
  const inp = { width:"100%",padding:"11px 13px",borderRadius:9,border:"1.5px solid #dde4ef",background:"#fff",fontSize:14,outline:"none",color:"#1a2a3a" };
  const tabStyle = (active) => ({ flex:1,padding:"9px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:active?"#0f2744":"transparent",color:active?"#fff":"#8a95a5" });
  return (
    <div style={{ position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }}>
      <div onClick={onClose} style={{ position:"absolute",inset:0,background:"rgba(0,0,0,0.5)" }}/>
      <div style={{ position:"relative",width:"100%",maxWidth:400,background:"#fff",borderRadius:16,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.25)" }}>
        <div style={{ background:"linear-gradient(160deg,#0a1e35,#0f2744)",padding:"18px 20px" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div style={{ fontSize:15,fontWeight:800,color:"#fff" }}>⚙️ アカウント設定</div>
            <button onClick={onClose} style={{ border:"none",background:"rgba(255,255,255,0.15)",color:"#fff",borderRadius:20,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700 }}>✕ 閉じる</button>
          </div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:6 }}>{user.email}</div>
        </div>
        <div style={{ display:"flex",gap:4,padding:"12px 16px 0",background:"#f8fafd",borderBottom:"1px solid #edf0f6" }}>
          <button style={tabStyle(tab==="password")} onClick={()=>{ setTab("password"); reset(); }}>パスワード変更</button>
          <button style={tabStyle(tab==="email")} onClick={()=>{ setTab("email"); reset(); }}>メールアドレス変更</button>
        </div>
        <div style={{ padding:"20px 20px 24px" }}>
          {tab === "password" ? (
            <>
              <div style={{ marginBottom:13 }}><div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>現在のパスワード</div><input type="password" value={currentPw} onChange={e=>{setCurrentPw(e.target.value);setError("");}} placeholder="現在のパスワード" style={inp}/></div>
              <div style={{ marginBottom:13 }}><div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>新しいパスワード（6文字以上）</div><input type="password" value={newPw} onChange={e=>{setNewPw(e.target.value);setError("");}} placeholder="新しいパスワード" style={inp}/></div>
              <div style={{ marginBottom:16 }}><div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>新しいパスワード（確認）</div><input type="password" value={newPw2} onChange={e=>{setNewPw2(e.target.value);setError("");}} placeholder="もう一度入力" style={inp}/></div>
              {error&&<div style={{ padding:"10px 12px",background:"#fff0f0",border:"1px solid #fcc",borderRadius:8,color:"#c04040",fontSize:12.5,marginBottom:12 }}>⚠ {error}</div>}
              {success&&<div style={{ padding:"10px 12px",background:"#f0fdf6",border:"1px solid #a0d8b8",borderRadius:8,color:"#1a7a50",fontSize:12.5,marginBottom:12 }}>{success}</div>}
              <button onClick={handlePasswordChange} disabled={loading} style={{ width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#0f2744",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>{loading?"変更中...":"パスワードを変更する"}</button>
            </>
          ) : (
            <>
              <div style={{ padding:"10px 13px",background:"#fffbef",border:"1px solid #e8c95a",borderRadius:9,fontSize:12.5,color:"#7a6020",marginBottom:16,lineHeight:1.6 }}>📧 新しいメールアドレスに確認メールが届きます。リンクをクリックすると変更が完了します。</div>
              <div style={{ marginBottom:13 }}><div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>現在のパスワード</div><input type="password" value={currentPw} onChange={e=>{setCurrentPw(e.target.value);setError("");}} placeholder="本人確認のため入力" style={inp}/></div>
              <div style={{ marginBottom:16 }}><div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>新しいメールアドレス</div><input type="email" value={newEmail} onChange={e=>{setNewEmail(e.target.value);setError("");}} placeholder="new@example.com" style={inp}/></div>
              {error&&<div style={{ padding:"10px 12px",background:"#fff0f0",border:"1px solid #fcc",borderRadius:8,color:"#c04040",fontSize:12.5,marginBottom:12 }}>⚠ {error}</div>}
              {success&&<div style={{ padding:"10px 12px",background:"#f0fdf6",border:"1px solid #a0d8b8",borderRadius:8,color:"#1a7a50",fontSize:12.5,marginBottom:12,lineHeight:1.6 }}>{success}</div>}
              <button onClick={handleEmailChange} disabled={loading} style={{ width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#0f2744",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:loading?0.7:1 }}>{loading?"送信中...":"確認メールを送信する"}</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── 商品行（詳細展開済み） ───────────────────────────────────────────────
function ProductRow({ product, index, orderDate }) {
  const [open, setOpen] = useState(true);
  const s = STATUS_STAGES[product.status];
  // リードタイム計算
  const completedRecord = (product.deliveryRecords||[]).find(r => r.status==="発送済" && r.delivDate);
  const orderDateObj = parseJpDate(orderDate);
  const delivDateObj = completedRecord ? parseJpDate(completedRecord.delivDate) : null;
  const days = daysBetween(orderDateObj, delivDateObj);
  const ltLabel = leadTimeLabel(days);

  return (
    <div style={{ borderBottom:"1px solid #f0f4f9" }}>
      <div onClick={()=>setOpen(o=>!o)} style={{ display:"flex",alignItems:"center",padding:"11px 14px",cursor:"pointer",gap:10,background:open?"#f8fafd":"#fff" }}>
        <div style={{ width:22,height:22,borderRadius:6,background:"#f0f4ff",color:"#4a7cc7",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>{index+1}</div>
        <div style={{ flex:1,minWidth:0 }}>
          <div style={{ fontSize:13,fontWeight:600,color:"#1a2a3a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:open?"normal":"nowrap" }}>{product.name}</div>
          {!open&&(
            <div style={{ display:"flex",alignItems:"center",gap:6,marginTop:3,flexWrap:"wrap" }}>
              <span style={{ fontSize:11,color:"#8a95a5" }}>{product.qty}</span>
              <span style={{ width:3,height:3,borderRadius:"50%",background:"#d0d8e4" }}/>
              <span style={{ fontSize:11,fontWeight:700,color:s.color }}>{s.icon} {s.short}</span>
              {ltLabel&&<span style={{ fontSize:11,fontWeight:700,padding:"1px 6px",borderRadius:5,background:ltLabel.bg,color:ltLabel.color }}>⏱ {ltLabel.text}</span>}
            </div>
          )}
        </div>
        <div style={{ flexShrink:0,padding:"4px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:s.color+"18",color:s.color,border:`1px solid ${s.color}35`,whiteSpace:"nowrap" }}>{s.icon} {s.short}</div>
        <div style={{ fontSize:14,color:"#c0c8d4",flexShrink:0,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s" }}>⌄</div>
      </div>
      {open&&(
        <div style={{ padding:"12px 14px 14px 48px",background:"#f8fafd",borderTop:"1px solid #edf0f6" }}>
          <div style={{ display:"grid",gridTemplateColumns:"auto 1fr",gap:"6px 14px",fontSize:12.5,marginBottom:product.deliveryRecords&&product.deliveryRecords.length>0?12:0 }}>
            <span style={{ color:"#8a95a5" }}>数量</span><span style={{ color:"#1a2a3a",fontWeight:600 }}>{product.qty}</span>
            <span style={{ color:"#8a95a5" }}>ステータス</span><span style={{ color:s.color,fontWeight:700 }}>{s.icon} {s.label}</span>
            {product.deliveryInfo&&<><span style={{ color:"#8a95a5" }}>納品状況</span><span style={{ color:"#e07d20",fontWeight:700 }}>{product.deliveryInfo}</span></>}
            {product.eta&&product.eta!=="—"&&product.status<6&&product.status!==7&&<><span style={{ color:"#8a95a5" }}>お届け目安</span><span style={{ color:"#1a2a3a",fontWeight:700 }}>{product.eta}</span></>}
            {ltLabel&&<><span style={{ color:"#8a95a5" }}>リードタイム</span><span style={{ fontWeight:700,color:ltLabel.color,background:ltLabel.bg,padding:"2px 8px",borderRadius:6,display:"inline-block" }}>⏱ 注文から納品まで {ltLabel.text}</span></>}
            {product.note&&<><span style={{ color:"#8a95a5" }}>備考</span><span style={{ color:"#5a6a7a",lineHeight:1.5 }}>{product.note}</span></>}
          </div>
          {product.deliveryRecords&&product.deliveryRecords.length>0&&(
            <div style={{ padding:"10px 12px",background:"#fff8f0",borderRadius:9,border:"1px solid #f0c090" }}>
              <div style={{ fontSize:11,color:"#a04010",fontWeight:700,marginBottom:8 }}>🔶 分納履歴</div>
              {product.deliveryRecords.map((r,i)=>(
                <div key={i} style={{ display:"flex",alignItems:"center",gap:8,marginBottom:i<product.deliveryRecords.length-1?6:0,fontSize:12 }}>
                  <span style={{ padding:"2px 7px",borderRadius:5,background:r.status==="発送済"?"#e8f4ee":"#f4f6fb",color:r.status==="発送済"?"#1a7a50":"#6a7a8a",fontWeight:700,fontSize:11,flexShrink:0 }}>{r.status==="発送済"?"✅ 納品済":"📋 未発送"}</span>
                  <span style={{ color:"#1a2a3a",fontWeight:600 }}>{r.qty}{r.unit}</span>
                  {r.delivDate&&<span style={{ color:"#8a95a5" }}>納品日：{r.delivDate}</span>}
                  {!r.delivDate&&r.shipDate&&<span style={{ color:"#8a95a5" }}>発送日：{r.shipDate}</span>}
                  {!r.delivDate&&!r.shipDate&&r.status!=="発送済"&&<span style={{ color:"#a0aab8" }}>未発送</span>}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── グループ別商品リスト ──────────────────────────────────────────────────
function GroupedProductList({ products, orderDate }) {
  const [openGroups, setOpenGroups] = useState({0:true,1:true,2:true,3:true,4:true});
  const done=products.filter(p=>p.status===6).length;
  const partial=products.filter(p=>p.status===7).length;
  const soon=products.filter(p=>p.status>=4&&p.status<6).length;
  const trans=products.filter(p=>p.status>=2&&p.status<4).length;
  const prep=products.filter(p=>p.status<2).length;
  const chips=[done&&{label:`✅ 完了 ${done}件`,bg:"#e8f4ee",color:"#1a7a50"},partial&&{label:`🔶 一部発送済み ${partial}件`,bg:"#fff8f0",color:"#a04010"},soon&&{label:`🚚 到着まもなく ${soon}件`,bg:"#fff8e8",color:"#8a6010"},trans&&{label:`🌏 輸送中 ${trans}件`,bg:"#f0f6ff",color:"#2a5090"},prep&&{label:`📦 準備中 ${prep}件`,bg:"#f4f6fb",color:"#4a6080"}].filter(Boolean);
  return (
    <div style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",overflow:"hidden",boxShadow:"0 2px 10px rgba(10,30,53,0.05)" }}>
      <div style={{ display:"flex",gap:6,flexWrap:"wrap",padding:"13px 14px",borderBottom:"1px solid #edf0f6" }}>
        <span style={{ fontSize:12,color:"#8a95a5",alignSelf:"center",marginRight:2 }}>全{products.length}種類：</span>
        {chips.map((c,i)=><span key={i} style={{ padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:c.bg,color:c.color }}>{c.label}</span>)}
      </div>
      {GROUP_DEFS.map((g,gi)=>{
        const items=products.filter(p=>g.ids.includes(p.status));
        if(!items.length) return null;
        const isOpen=openGroups[gi]!==false;
        return (
          <div key={gi}>
            <div onClick={()=>setOpenGroups(s=>({...s,[gi]:!s[gi]}))} style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",cursor:"pointer",background:g.bg,borderTop:"1.5px solid #edf0f6" }}>
              <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                <span style={{ fontSize:13,fontWeight:800,color:g.text }}>{g.label}</span>
                <span style={{ padding:"2px 8px",borderRadius:20,fontSize:11.5,fontWeight:700,background:"rgba(255,255,255,0.7)",color:g.text,border:`1px solid ${g.border}50` }}>{items.length}件</span>
              </div>
              <div style={{ fontSize:14,color:g.text,opacity:0.6,transform:isOpen?"rotate(180deg)":"none",transition:"transform 0.2s" }}>⌄</div>
            </div>
            {isOpen&&items.map((p,i)=><ProductRow key={i} product={p} index={products.indexOf(p)} orderDate={orderDate}/>)}
          </div>
        );
      })}
    </div>
  );
}

// ── リクエスト ────────────────────────────────────────────────────────────
const PROGRESS_STAGES = [
  { key:"受付待ち",  color:"#8a9ab5", bg:"#f4f6fb", icon:"📋" },
  { key:"確認中",   color:"#4a7cc7", bg:"#f0f6ff", icon:"👀" },
  { key:"対応中",   color:"#d4a843", bg:"#fffbef", icon:"🔧" },
  { key:"完了",     color:"#3aa876", bg:"#f0fdf6", icon:"✅" },
];
const CATEGORIES = ["納期確認", "商品に関する質問", "注文変更・キャンセル", "請求・支払い", "その他"];

function RequestPanel({ order, user, myRequests, onSent }) {
  const [open, setOpen] = useState(false);
  const [category, setCategory] = useState("納期確認");
  const [message, setMessage] = useState("");
  const [sending, setSending] = useState(false);

  // この注文のリクエスト（最新順）
  const orderRequests = myRequests
    .filter(r => r.orderId === order.id)
    .sort((a,b) => b.createdAt.localeCompare(a.createdAt));

  const handleSend = async () => {
    if (!message.trim()) return;
    setSending(true);
    try {
      await window._firebase.sendRequest(order.id, order.clinic, user.email, message.trim(), category);
      setMessage(""); setCategory("納期確認"); setOpen(false); onSent();
    } catch(e) { alert("送信に失敗しました。もう一度お試しください。"); }
    setSending(false);
  };

  const progressOf = (r) => {
    const p = PROGRESS_STAGES.find(s => s.key === (r.progress || "受付待ち")) || PROGRESS_STAGES[0];
    return p;
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      {/* 送信済みリクエスト一覧 */}
      {orderRequests.map((r,i) => {
        const prog = progressOf(r);
        const progIdx = PROGRESS_STAGES.findIndex(s => s.key === prog.key);
        return (
          <div key={i} style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",overflow:"hidden",boxShadow:"0 2px 10px rgba(10,30,53,0.05)" }}>
            {/* リクエストヘッダー */}
            <div style={{ padding:"12px 16px",borderBottom:"1px solid #f0f4f9" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6 }}>
                <div style={{ display:"flex",alignItems:"center",gap:6,flexWrap:"wrap" }}>
                  <span style={{ padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:"#f0f4ff",color:"#4a5568",border:"1px solid #dde4ef" }}>{r.category||"その他"}</span>
                  <span style={{ padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,background:prog.bg,color:prog.color,border:`1px solid ${prog.color}40` }}>{prog.icon} {prog.key}</span>
                </div>
                <span style={{ fontSize:10.5,color:"#a0aab8",flexShrink:0,marginLeft:8 }}>{r.createdAt}</span>
              </div>
              {/* 進捗バー */}
              <div style={{ display:"flex",gap:3,marginTop:6 }}>
                {PROGRESS_STAGES.map((s,si) => (
                  <div key={si} style={{ flex:1,height:4,borderRadius:4,background:si<=progIdx?s.color:"#e4eaf3",transition:"background 0.3s" }}/>
                ))}
              </div>
              <div style={{ display:"flex",justifyContent:"space-between",marginTop:3 }}>
                {PROGRESS_STAGES.map((s,si) => (
                  <div key={si} style={{ fontSize:8.5,color:si<=progIdx?s.color:"#c0c8d4",fontWeight:si===progIdx?700:400 }}>{s.key}</div>
                ))}
              </div>
            </div>
            {/* メッセージ */}
            <div style={{ padding:"10px 16px" }}>
              <div style={{ padding:"10px 12px",background:"#f8fafd",borderRadius:9,fontSize:13,color:"#4a5568",lineHeight:1.7,marginBottom:r.reply?10:0 }}>{r.message}</div>
              {r.reply ? (
                <div>
                  <div style={{ fontSize:11.5,color:"#8a95a5",margin:"8px 0 5px",fontWeight:600 }}>💬 担当者からの返信</div>
                  <div style={{ padding:"12px 14px",background:"#f0f6ff",borderRadius:9,border:"1px solid #d0e0f4",fontSize:13,color:"#1a3a5c",lineHeight:1.7 }}>{r.reply}</div>
                  <div style={{ fontSize:10.5,color:"#a0aab8",marginTop:5,textAlign:"right" }}>返信：{r.repliedAt}</div>
                </div>
              ) : (
                <div style={{ padding:"8px 12px",background:"#fffbef",borderRadius:9,border:"1px solid #e8c95a",fontSize:12,color:"#7a6020",marginTop:8 }}>
                  🕐 担当者が確認中です。しばらくお待ちください。
                </div>
              )}
            </div>
          </div>
        );
      })}

      {/* 新規リクエスト */}
      {!open ? (
        <button onClick={()=>setOpen(true)}
          style={{ width:"100%",padding:"13px",borderRadius:12,border:"2px solid #4a7cc7",background:"#fff",color:"#4a7cc7",fontWeight:800,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8 }}>
          📩 担当者へリクエストを送る
        </button>
      ) : (
        <div style={{ background:"#fff",borderRadius:14,border:"2px solid #4a7cc7",padding:"18px",boxShadow:"0 4px 16px rgba(74,124,199,0.12)" }}>
          <div style={{ fontSize:14,fontWeight:800,color:"#0f2744",marginBottom:14 }}>📩 担当者へリクエスト</div>
          {/* カテゴリ選択 */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>カテゴリ</div>
            <div style={{ display:"flex",gap:5,flexWrap:"wrap" }}>
              {CATEGORIES.map(c => (
                <button key={c} onClick={()=>setCategory(c)}
                  style={{ padding:"5px 12px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:12,fontWeight:700,
                    borderColor:category===c?"#4a7cc7":"#dde4ef",
                    background:category===c?"#4a7cc7":"#fff",
                    color:category===c?"#fff":"#6a7a8a" }}>
                  {c}
                </button>
              ))}
            </div>
          </div>
          {/* メッセージ入力 */}
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:6 }}>内容</div>
            <textarea value={message} onChange={e=>setMessage(e.target.value)} rows={4}
              placeholder="ご要望・ご質問をご記入ください"
              style={{ width:"100%",padding:"10px 12px",borderRadius:9,border:"1.5px solid #dde4ef",fontSize:13,outline:"none",resize:"vertical",lineHeight:1.7,color:"#1a2a3a" }}/>
          </div>
          <div style={{ fontSize:11.5,color:"#8a95a5",marginBottom:14 }}>
            注文番号：{order.id}　{order.clinic}
          </div>
          <div style={{ display:"flex",gap:8 }}>
            <button onClick={()=>{setOpen(false);setMessage("");}}
              style={{ flex:1,padding:"11px",borderRadius:9,border:"1.5px solid #dde4ef",background:"#fff",fontSize:14,cursor:"pointer",color:"#666" }}>キャンセル</button>
            <button onClick={handleSend} disabled={sending||!message.trim()}
              style={{ flex:2,padding:"11px",borderRadius:9,border:"none",background:"#4a7cc7",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:(sending||!message.trim())?0.5:1 }}>
              {sending?"送信中...":"送信する"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ダッシュボードパネル（右側デフォルト表示） ───────────────────────────
// displayOrders: 現在の月タブでフィルタ済み、allOrders: 全件（リードタイム計算用）
function DashboardPanel({ displayOrders, allOrders, currentMonth, onSelectOrder }) {
  const allProducts = displayOrders.flatMap(o => o.products);
  const inProgress = allProducts.filter(p => p.status < 6).length;
  const completed = allProducts.filter(p => p.status === 6).length;
  const partial = allProducts.filter(p => p.status === 7).length;
  const soon = allProducts.filter(p => p.status >= 4 && p.status < 6).length;

  // リードタイム計算は全件データから（サンプル数を稼ぐため）
  const leadTimes = [];
  allOrders.forEach(order => {
    const orderDate = parseJpDate(order.date);
    if (!orderDate) return;
    order.products.forEach(p => {
      if (p.status === 6 || p.status === 7) {
        const completedRecord = (p.deliveryRecords||[]).find(r => r.status==="発送済" && r.delivDate);
        if (completedRecord) {
          const delivDate = parseJpDate(completedRecord.delivDate);
          const days = daysBetween(orderDate, delivDate);
          if (days !== null && days > 0 && days < 365) leadTimes.push(days);
        }
      }
    });
  });
  const avgLeadTime = leadTimes.length > 0 ? Math.round(leadTimes.reduce((a,b)=>a+b,0)/leadTimes.length) : null;
  const minLT = leadTimes.length > 0 ? Math.min(...leadTimes) : null;
  const maxLT = leadTimes.length > 0 ? Math.max(...leadTimes) : null;

  // 対応中注文（現在の月タブのもの）
  const pendingOrders = displayOrders.filter(o => o.products.some(p => p.status < 6));
  const doneOrders = displayOrders.filter(o => o.products.every(p => p.status === 6));

  const monthLabel = currentMonth ? currentMonth.replace("-","年").replace(/-(\d{2})$/, "$1月") : "";

  return (
    <div style={{ display:"flex",flexDirection:"column",gap:16,padding:"20px" }}>
      {/* 月ラベル */}
      <div style={{ display:"flex",alignItems:"center",gap:8 }}>
        <div style={{ fontSize:14,fontWeight:800,color:"#0f2744" }}>📊 {monthLabel} のサマリー</div>
        <div style={{ fontSize:11.5,color:"#a0aab8" }}>{displayOrders.length}件</div>
      </div>

      {/* サマリーカード */}
      {(() => {
        // カードごとに対応商品リストを作成
        const inProgressList = allProducts.filter(p => p.status < 6 && p.status !== 7);
        const soonList       = allProducts.filter(p => p.status >= 4 && p.status < 6);
        const partialList    = allProducts.filter(p => p.status === 7);
        const completedList  = allProducts.filter(p => p.status === 6);

        const SummaryCard = ({ label, value, color, bg, icon, items }) => {
          const SHOW = 4; // 折りたたみなしで表示する件数
          const showItems = items.slice(0, SHOW);
          const rest = items.length - SHOW;
          return (
            <div style={{ background:bg, borderRadius:12, padding:"13px 14px", border:`1.5px solid ${color}30`, display:"flex", flexDirection:"column" }}>
              <div style={{ fontSize:10.5, color:color, fontWeight:700, marginBottom:3 }}>{icon} {label}</div>
              <div style={{ fontSize:24, fontWeight:900, color:color, marginBottom: items.length > 0 ? 8 : 0 }}>
                {value}<span style={{ fontSize:11, marginLeft:3 }}>件</span>
              </div>
              {showItems.length > 0 && (
                <div style={{ borderTop:`1px solid ${color}20`, paddingTop:7, display:"flex", flexDirection:"column", gap:4 }}>
                  {showItems.map((p, i) => {
                    // （）より前の商品名本体だけ表示
                    const shortName = p.name.split("（")[0].split("　")[0].trim();
                    return (
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", gap:6 }}>
                        <div style={{ fontSize:10, color:"#4a5568", lineHeight:1.4, flex:1, minWidth:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                          {shortName}
                        </div>
                        <div style={{ fontSize:10.5, fontWeight:700, color:color, flexShrink:0, whiteSpace:"nowrap" }}>
                          {p.qty}
                        </div>
                      </div>
                    );
                  })}
                  {rest > 0 && (
                    <div style={{ fontSize:10, color:"#a0aab8", marginTop:2 }}>他 {rest} 商品...</div>
                  )}
                </div>
              )}
            </div>
          );
        };

        // シンプルカード（件数のみ）
        const SimpleCard = ({ label, value, color, bg, icon }) => (
          <div style={{ background:bg, borderRadius:12, padding:"13px 14px", border:`1.5px solid ${color}30` }}>
            <div style={{ fontSize:10.5, color:color, fontWeight:700, marginBottom:3 }}>{icon} {label}</div>
            <div style={{ fontSize:24, fontWeight:900, color:color }}>{value}<span style={{ fontSize:11, marginLeft:3 }}>件</span></div>
          </div>
        );

        return (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {/* 対応中商品だけ商品リスト付き */}
            <SummaryCard label="対応中商品" value={inProgress} color="#d4a843" bg="#fffbef" icon="📦" items={inProgressList} />
            <SimpleCard label="もうすぐ到着" value={soon} color="#3aa876" bg="#f0fdf6" icon="🚚" />
            <SimpleCard label="一部発送済み" value={partial} color="#e07d20" bg="#fff8f0" icon="🔶" />
            <SimpleCard label="納品完了" value={completed} color="#6b8cba" bg="#f4f6fb" icon="✅" />
          </div>
        );
      })()}

      {/* リードタイム統計（全期間） */}
      {leadTimes.length > 0 && (
        <div style={{ background:"#fff",borderRadius:14,border:"1.5px solid #e4eaf3",padding:"16px",boxShadow:"0 2px 8px rgba(10,30,53,0.05)" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
            <div style={{ fontSize:13,fontWeight:800,color:"#0f2744" }}>⏱ 納品リードタイム実績</div>
            <div style={{ fontSize:10.5,color:"#a0aab8" }}>全期間 {leadTimes.length}商品</div>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:8 }}>
            {[
              { label:"平均", value:avgLeadTime },
              { label:"最短", value:minLT },
              { label:"最長", value:maxLT },
            ].map(s => (
              <div key={s.label} style={{ textAlign:"center",padding:"10px 8px",background:"#f8fafd",borderRadius:10,border:"1.5px solid #e4eaf3" }}>
                <div style={{ fontSize:10,color:"#8a95a5",fontWeight:600,marginBottom:4 }}>{s.label}</div>
                <div style={{ fontSize:22,fontWeight:900,color:"#0f2744" }}>{s.value}<span style={{ fontSize:11,color:"#8a95a5",marginLeft:2 }}>日</span></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 対応中注文（クリックで詳細表示） */}
      {pendingOrders.length > 0 && (
        <div>
          <div style={{ fontSize:13,fontWeight:800,color:"#0f2744",marginBottom:10 }}>
            📋 {monthLabel} の対応中注文
            <span style={{ fontSize:11.5,color:"#a0aab8",fontWeight:400,marginLeft:6 }}>{pendingOrders.length}件 — クリックで詳細表示</span>
          </div>
          {pendingOrders.map(order => {
            const pending = order.products.filter(p => p.status < 6);
            const orderDate = parseJpDate(order.date);
            const todayDays = orderDate ? daysBetween(orderDate, new Date()) : null;
            return (
              <div key={order.id} onClick={() => onSelectOrder(order)}
                style={{ background:"#fff",borderRadius:12,border:"1.5px solid #e4eaf3",padding:"12px 14px",marginBottom:8,
                  boxShadow:"0 1px 4px rgba(10,30,53,0.04)",cursor:"pointer",transition:"all 0.15s" }}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#4a7cc7"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#e4eaf3"}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8 }}>
                  <div>
                    <div style={{ fontSize:13,fontWeight:800,color:"#0f2744" }}>{order.id}</div>
                    <div style={{ fontSize:11,color:"#a0aab8",marginTop:1 }}>{order.date}</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    {todayDays !== null && (
                      <div style={{ fontSize:13,fontWeight:800,color:todayDays>60?"#e07d20":todayDays>30?"#d4a843":"#4a7cc7" }}>
                        {todayDays}日<span style={{ fontSize:10,fontWeight:400,color:"#a0aab8",marginLeft:2 }}>経過</span>
                      </div>
                    )}
                    <div style={{ fontSize:10.5,color:"#4a7cc7",fontWeight:700,marginTop:2 }}>詳細を見る →</div>
                  </div>
                </div>
                <div style={{ display:"flex",flexWrap:"wrap",gap:4 }}>
                  {pending.map((p,i) => {
                    const s = STATUS_STAGES[p.status];
                    return (
                      <span key={i} style={{ fontSize:10.5,padding:"2px 8px",borderRadius:20,background:s.color+"15",color:s.color,border:`1px solid ${s.color}30`,fontWeight:600 }}>
                        {s.icon} {p.name.length>18?p.name.slice(0,18)+"…":p.name}
                      </span>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 完了済み注文（折りたたみ） */}
      {doneOrders.length > 0 && (
        <div>
          <div style={{ fontSize:13,fontWeight:800,color:"#6b8cba",marginBottom:8 }}>
            ✅ {monthLabel} の完了注文
            <span style={{ fontSize:11.5,fontWeight:400,marginLeft:6 }}>{doneOrders.length}件 — クリックで詳細表示</span>
          </div>
          {doneOrders.map(order => {
            const orderDate = parseJpDate(order.date);
            // この注文の平均リードタイム
            const lt = [];
            order.products.forEach(p => {
              const r = (p.deliveryRecords||[]).find(r => r.status==="発送済" && r.delivDate);
              if (r && orderDate) {
                const days = daysBetween(orderDate, parseJpDate(r.delivDate));
                if (days > 0) lt.push(days);
              }
            });
            const avgLt = lt.length > 0 ? Math.round(lt.reduce((a,b)=>a+b,0)/lt.length) : null;
            const ltLabel = leadTimeLabel(avgLt);
            return (
              <div key={order.id} onClick={() => onSelectOrder(order)}
                style={{ background:"#f8fafd",borderRadius:12,border:"1.5px solid #e4eaf3",padding:"10px 14px",marginBottom:6,
                  cursor:"pointer",transition:"all 0.15s" }}
                onMouseEnter={e=>e.currentTarget.style.borderColor="#3aa876"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="#e4eaf3"}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <div>
                    <span style={{ fontSize:13,fontWeight:800,color:"#4a6080" }}>{order.id}</span>
                    <span style={{ fontSize:11,color:"#a0aab8",marginLeft:8 }}>{order.date}</span>
                  </div>
                  <div style={{ display:"flex",gap:6,alignItems:"center" }}>
                    {ltLabel && <span style={{ fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:20,background:ltLabel.bg,color:ltLabel.color }}>⏱ {ltLabel.text}</span>}
                    <span style={{ fontSize:10.5,color:"#3aa876",fontWeight:700 }}>詳細 →</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {displayOrders.length === 0 && (
        <div style={{ textAlign:"center",padding:"60px 20px",color:"#a0aab8" }}>
          <div style={{ fontSize:40,marginBottom:12 }}>📭</div>
          <div style={{ fontSize:14,fontWeight:700 }}>この月の注文データがありません</div>
        </div>
      )}
    </div>
  );
}
// ── 注文詳細パネル（右側） ───────────────────────────────────────────────
function OrderDetailPanel({ order, user, myRequests, onSent, onClose, isMobile }) {
  const orderDate = parseJpDate(order.date);

  // この注文のリードタイム
  const completedProducts = order.products.filter(p => p.status === 6);
  const leadTimes = completedProducts.flatMap(p => {
    const r = (p.deliveryRecords||[]).find(r => r.status==="発送済" && r.delivDate);
    if (!r || !orderDate) return [];
    const days = daysBetween(orderDate, parseJpDate(r.delivDate));
    return days !== null && days > 0 ? [days] : [];
  });
  const avgLT = leadTimes.length > 0 ? Math.round(leadTimes.reduce((a,b)=>a+b,0)/leadTimes.length) : null;
  const avgLtLabel = leadTimeLabel(avgLT);

  const inProgress = order.products.filter(p => p.status < 6).length;
  const todayDays = orderDate ? daysBetween(orderDate, new Date()) : null;

  return (
    <div style={{ display:"flex",flexDirection:"column",height:"100%",overflow:"hidden" }}>
      {/* 詳細ヘッダー */}
      <div style={{ background:"linear-gradient(160deg,#0a1e35,#0f2744)",padding:"20px 20px 22px",flexShrink:0 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12 }}>
          <div style={{ fontSize:11,color:"#d4a843",fontWeight:700,letterSpacing:"0.1em" }}>ORDER DETAIL</div>
          {isMobile && (
            <button onClick={onClose} style={{ border:"none",background:"rgba(255,255,255,0.15)",color:"#fff",borderRadius:20,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700 }}>✕ 閉じる</button>
          )}
        </div>
        <div style={{ fontSize:20,fontWeight:900,color:"#fff",marginBottom:3 }}>{order.id}</div>
        <div style={{ fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:10 }}>{order.clinic}　{order.date}</div>
        {/* ステータスバー */}
        <div style={{ display:"flex",gap:8,flexWrap:"wrap" }}>
          <span style={{ padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:"rgba(255,255,255,0.12)",color:"#fff" }}>全{order.products.length}種類</span>
          {inProgress > 0 && <span style={{ padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:"rgba(212,168,67,0.3)",color:"#ffd878",border:"1px solid rgba(212,168,67,0.4)" }}>対応中 {inProgress}件</span>}
          {todayDays !== null && <span style={{ padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.7)" }}>注文から{todayDays}日経過</span>}
          {avgLtLabel && <span style={{ padding:"4px 10px",borderRadius:20,fontSize:12,fontWeight:700,background:"rgba(255,255,255,0.12)",color:"#fff" }}>⏱ 平均{avgLtLabel.text}で納品</span>}
        </div>
      </div>
      {/* スクロール可能なコンテンツ */}
      <div style={{ flex:1,overflowY:"auto",padding:"16px 16px 32px" }}>
        <GroupedProductList products={order.products} orderDate={order.date} />
        <div style={{ marginTop:14 }}>
          <RequestPanel order={order} user={user} myRequests={myRequests} onSent={onSent} />
        </div>
      </div>
    </div>
  );
}

// ── メイン画面 ────────────────────────────────────────────────────────────
function MainScreen({ user }) {
  const [orders, setOrders] = useState([]);
  const [myRequests, setMyRequests] = useState([]);
  const [myOrders, setMyOrders] = useState([]);
  const [clinicNames, setClinicNames] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [selectedClinic, setSelectedClinic] = useState("all");
  const [loading, setLoading] = useState(true);
  const [showAccount, setShowAccount] = useState(false);
  const [showRequestModal, setShowRequestModal] = useState(false);
  const [isMobile, setIsMobile] = useState(window.innerWidth < 900);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [updating, setUpdating] = useState(false);

  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 900);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  // クリニック紐づけとリクエストは初回のみ取得
  const loadMeta = async () => {
    const [requestData, bindings] = await Promise.all([
      window._firebase.loadMyRequests(user.email),
      window._firebase.loadBindings(),
    ]);
    setMyRequests(requestData);
    const clinicVal = bindings[user.email];
    const names = clinicVal ? (Array.isArray(clinicVal) ? clinicVal : [clinicVal]).filter(Boolean) : [];
    setClinicNames(names);
    window._currentClinicNames = names; // subscribeOrdersコールバック用
    console.log("🏥 紐づきクリニック:", names);
    return names;
  };

  // 注文データを処理してmyOrdersに反映
  const processOrders = (orderData, names) => {
    setOrders(orderData);
    if (names.length > 0) {
      const filtered = orderData.filter(o => names.includes(o.clinic));
      filtered.sort((a,b) => b.id.localeCompare(a.id));
      setMyOrders(filtered);
      // 選択中の注文があれば最新データで更新
      setSelectedOrder(prev => prev ? (filtered.find(o => o.id === prev.id) || null) : null);
    }
    setLastUpdated(new Date());
    setLoading(false);
    setUpdating(false);
  };

  // リクエストを手動で再読み込み
  const loadData = async () => {
    const data = await window._firebase.loadMyRequests(user.email);
    setMyRequests(data);
  };

  // 手動更新ボタン（毎回bindingsを再読み込み）
  const handleRefresh = async () => {
    setUpdating(true);
    const names = await loadMeta(); // 常に最新のbindingsを取得
    const orderData = await window._firebase.loadOrders();
    processOrders(orderData, names);
  };

  useEffect(() => {
    let unsubscribe = null;
    const init = async () => {
      let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;}
      const names = await loadMeta();
      // リアルタイム購読：コールバック内でも最新のbindingsを参照するためrefを使う
      window._currentClinicNames = names;
      unsubscribe = window._firebase.subscribeOrders((orderData) => {
        // window._currentClinicNamesを参照することでbindings更新後も正しく動く
        processOrders(orderData, window._currentClinicNames || []);
      });
    };
    init();
    return () => { if (unsubscribe) unsubscribe(); };
  }, []);

  const months = [...new Set(myOrders.map(o => (o.date||"").slice(0,7)).filter(Boolean))].sort().reverse();
  const currentMonth = selectedMonth || months[0] || "";
  // クリニック一覧（複数紐づきの場合）
  const clinicsInOrders = [...new Set(myOrders.map(o => o.clinic).filter(Boolean))].sort();
  const displayOrders = myOrders
    .filter(o => (o.date||"").startsWith(currentMonth))
    .filter(o => selectedClinic === "all" || o.clinic === selectedClinic);

  // 月タブをクリックしたとき注文選択をリセット
  const handleMonthSelect = (m) => { setSelectedMonth(m); setSelectedOrder(null); };

  // ── ヘッダー ──
  const Header = () => (
    <div style={{ flexShrink:0 }}>
    <div style={{ background:"linear-gradient(160deg,#0a1e35 0%,#0f2744 55%,#1a3d6e 100%)",padding:"16px 20px 18px" }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
        <div>
          <div style={{ fontSize:10,letterSpacing:"0.2em",color:"#d4a843",fontWeight:700,marginBottom:3,textTransform:"uppercase" }}>Import Status Tracking</div>
          <div style={{ fontSize:18,fontWeight:900,color:"#fff",lineHeight:1.2 }}>輸入状況確認システム</div>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4 }}>ログイン中：{user.email}</div>
          <div style={{ fontSize:10.5,color:"rgba(255,255,255,0.35)",marginTop:3 }}>
            紐づき：{clinicNames.length > 0 ? clinicNames.join(' / ') : '（未設定）'}
          </div>
        </div>
        <div style={{ display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end" }}>
          <div style={{ display:"flex",gap:6,flexWrap:"wrap",justifyContent:"flex-end" }}>
            <a href="https://pitto.i15.bcart.jp" target="_blank" rel="noopener noreferrer"
              style={{ padding:"8px 18px",borderRadius:10,border:"none",
                background:"linear-gradient(135deg,#d4a843,#f0c040)",
                color:"#0a1e35",fontSize:13,cursor:"pointer",fontWeight:900,
                textDecoration:"none",display:"flex",alignItems:"center",gap:6,
                boxShadow:"0 3px 10px rgba(212,168,67,0.5)",
                letterSpacing:"0.04em" }}>
              🛒 受発注サイト PITTO
            </a>
            <button onClick={()=>setShowRequestModal(true)}
              style={{ padding:"6px 12px",borderRadius:8,border:"1px solid rgba(74,124,199,0.5)",background:"rgba(74,124,199,0.12)",color:"#90b8f8",fontSize:11.5,cursor:"pointer",fontWeight:700 }}>
              📩 リクエスト
            </button>
            <button onClick={()=>window._firebase.signOut()} style={{ padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"rgba(255,255,255,0.6)",fontSize:11.5,cursor:"pointer" }}>ログアウト</button>
            <button onClick={()=>setShowAccount(true)} style={{ padding:"6px 12px",borderRadius:8,border:"1px solid rgba(212,168,67,0.4)",background:"rgba(212,168,67,0.12)",color:"#d4a843",fontSize:11.5,cursor:"pointer",fontWeight:700 }}>⚙️ 設定</button>
          </div>
          {/* 最終更新時刻と手動更新ボタン */}
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            {lastUpdated && (
              <div style={{ fontSize:10.5,color:"rgba(255,255,255,0.4)" }}>
                {updating ? "🔄 更新中..." : `🕐 ${lastUpdated.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})} 更新`}
              </div>
            )}
            <button onClick={handleRefresh} disabled={updating}
              style={{ padding:"5px 11px",borderRadius:8,border:"1px solid rgba(58,168,118,0.5)",background:"rgba(58,168,118,0.12)",color:"#7df0b0",fontSize:11,cursor:"pointer",fontWeight:700,opacity:updating?0.5:1 }}>
              🔄 手動更新
            </button>
          </div>
        </div>
      </div>
    </div>
    </div>
  );

  // ── 注文一覧（左パネル） ──
  const OrderList = () => (
    <div style={{ display:"flex",flexDirection:"column",height:"100%",overflow:"hidden" }}>
      {/* 月タブ */}
      <div style={{ padding:"10px 14px 0",flexShrink:0,background:"#fff" }}>
        <div style={{ display:"flex",gap:5,flexWrap:"wrap",marginBottom:8 }}>
          {months.map(m => (
            <button key={m} onClick={()=>handleMonthSelect(m)}
              style={{ padding:"5px 12px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:12,fontWeight:700,
                borderColor:currentMonth===m?"#d4a843":"#8a9ab5",
                background:currentMonth===m?"#d4a843":"#1e3a5f",
                color:currentMonth===m?"#0a1e35":"#a0b8d0" }}>
              {m.replace("-","年").replace(/-(\d{2})$/,"$1月")}
              <span style={{ fontSize:10,marginLeft:4,opacity:0.8 }}>{myOrders.filter(o=>(o.date||"").startsWith(m)).length}</span>
            </button>
          ))}
        </div>
        {/* クリニック切り替え（複数紐づきの場合のみ表示） */}
        {clinicsInOrders.length > 1 && (
          <div style={{ display:"flex",gap:5,flexWrap:"wrap",paddingBottom:10,borderBottom:"1px solid #e4eaf3" }}>
            <button onClick={()=>setSelectedClinic("all")}
              style={{ padding:"4px 11px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:11,fontWeight:700,
                borderColor:selectedClinic==="all"?"#4a7cc7":"#dde4ef",
                background:selectedClinic==="all"?"#4a7cc7":"#fff",
                color:selectedClinic==="all"?"#fff":"#6a7a8a" }}>
              🏥 全クリニック
              <span style={{ fontSize:10,marginLeft:3,opacity:0.8 }}>
                {myOrders.filter(o=>(o.date||"").startsWith(currentMonth)).length}
              </span>
            </button>
            {clinicsInOrders.map(c => (
              <button key={c} onClick={()=>setSelectedClinic(c)}
                style={{ padding:"4px 11px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontSize:11,fontWeight:700,
                  borderColor:selectedClinic===c?"#0f2744":"#dde4ef",
                  background:selectedClinic===c?"#0f2744":"#fff",
                  color:selectedClinic===c?"#fff":"#6a7a8a" }}>
                {c}
                <span style={{ fontSize:10,marginLeft:3,opacity:0.8 }}>
                  {myOrders.filter(o=>(o.date||"").startsWith(currentMonth) && o.clinic===c).length}
                </span>
              </button>
            ))}
          </div>
        )}
        {clinicsInOrders.length <= 1 && (
          <div style={{ borderBottom:"1px solid #e4eaf3",marginBottom:0 }}/>
        )}
      </div>
      {/* 注文カード一覧 */}
      <div style={{ flex:1,overflowY:"auto",padding:"10px" }}>
        {loading && <div style={{ textAlign:"center",padding:"40px 0",color:"#8a95a5",fontSize:13 }}>読み込み中...</div>}
        {!loading && displayOrders.length === 0 && <div style={{ textAlign:"center",padding:"40px 0",color:"#a0aab8",fontSize:13 }}>注文がありません</div>}
        {displayOrders.map(order => {
          const isSelected = selectedOrder?.id === order.id;
          const active = order.products.filter(p=>p.status<6).length;
          const orderDate = parseJpDate(order.date);
          const todayDays = orderDate ? daysBetween(orderDate, new Date()) : null;
          return (
            <div key={order.id} onClick={()=>setSelectedOrder(order)}
              style={{ background:isSelected?"#0f2744":"#fff",borderRadius:12,border:`1.5px solid ${isSelected?"#0f2744":"#e4eaf3"}`,marginBottom:8,overflow:"hidden",cursor:"pointer",boxShadow:isSelected?"0 4px 16px rgba(15,39,68,0.2)":"0 1px 4px rgba(10,30,53,0.05)",transition:"all 0.15s" }}>
              {/* ヘッダー行 */}
              <div style={{ padding:"11px 13px",borderBottom:`1px solid ${isSelected?"rgba(255,255,255,0.1)":"#f0f4f9"}` }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <span style={{ fontSize:14,fontWeight:900,color:isSelected?"#fff":"#0f2744",letterSpacing:"0.03em" }}>{order.id}</span>
                  <div style={{ display:"flex",gap:5,alignItems:"center" }}>
                    {active>0 && <span style={{ padding:"2px 7px",borderRadius:20,fontSize:10.5,fontWeight:700,background:isSelected?"rgba(212,168,67,0.3)":"#fff8e8",color:isSelected?"#ffd878":"#b87f0a",border:isSelected?"1px solid rgba(212,168,67,0.4)":"1px solid #e8c95a" }}>対応中 {active}</span>}
                    {active===0 && <span style={{ padding:"2px 7px",borderRadius:20,fontSize:10.5,fontWeight:700,background:isSelected?"rgba(58,168,118,0.2)":"#e8f4ee",color:isSelected?"#7df0b0":"#1a7a50" }}>✅ 完了</span>}
                  </div>
                </div>
                <div style={{ display:"flex",gap:8,marginTop:3,alignItems:"center" }}>
                  <span style={{ fontSize:10.5,color:isSelected?"rgba(255,255,255,0.5)":"#a0aab8" }}>{order.date}</span>
                  {todayDays !== null && <span style={{ fontSize:10.5,color:isSelected?"rgba(255,255,255,0.4)":"#c0c8d4" }}>（{todayDays}日経過）</span>}
                </div>
              </div>
              {/* 商品一覧（コンパクト） */}
              <div style={{ padding:"8px 13px" }}>
                {order.products.map((p,i) => {
                  const s = STATUS_STAGES[p.status]||STATUS_STAGES[0];
                  return (
                    <div key={i} style={{ display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:i<order.products.length-1?`1px solid ${isSelected?"rgba(255,255,255,0.07)":"#f8fafd"}`:"none" }}>
                      <div style={{ flex:1,minWidth:0,fontSize:11.5,color:isSelected?"rgba(255,255,255,0.8)":"#1a2a3a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:500 }}>{p.name}</div>
                      <span style={{ flexShrink:0,padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,background:isSelected?s.color+"40":s.color+"18",color:isSelected?"#fff":s.color,border:`1px solid ${s.color}${isSelected?"60":"35"}`,whiteSpace:"nowrap" }}>{s.icon} {s.short}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  return (
    <div style={{ display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden" }}>
      <Header/>
      {isMobile ? (
        // ── モバイル：縦並び + スライドパネル ──
        <div style={{ flex:1,overflowY:"auto",background:"#f0f4f9" }}>
          <div style={{ padding:"14px" }}>
            <OrderList/>
          </div>
          {selectedOrder && (
            <div style={{ position:"fixed",inset:0,zIndex:100,display:"flex" }}>
              <div onClick={()=>setSelectedOrder(null)} style={{ flex:1,background:"rgba(0,0,0,0.4)" }}/>
              <div style={{ width:"min(520px,100vw)",background:"#f0f4f9",display:"flex",flexDirection:"column",boxShadow:"-8px 0 32px rgba(0,0,0,0.2)" }}>
                <OrderDetailPanel order={selectedOrder} user={user} myRequests={myRequests} onSent={loadData} onClose={()=>setSelectedOrder(null)} isMobile={true}/>
              </div>
            </div>
          )}
        </div>
      ) : (
        // ── デスクトップ：2ペイン ──
        <div style={{ flex:1,display:"flex",overflow:"hidden",background:"#f0f4f9" }}>
          {/* 左：注文一覧 */}
          <div style={{ width:380,flexShrink:0,background:"#f0f4f9",borderRight:"1.5px solid #e4eaf3",display:"flex",flexDirection:"column",overflow:"hidden" }}>
            <OrderList/>
          </div>
          {/* 右：詳細 or ダッシュボード */}
          <div style={{ flex:1,overflow:"hidden",background:"#f0f4f9" }}>
            {selectedOrder ? (
              <OrderDetailPanel order={selectedOrder} user={user} myRequests={myRequests} onSent={loadData} onClose={()=>setSelectedOrder(null)} isMobile={false}/>
            ) : (
              <div style={{ height:"100%",overflowY:"auto" }}>
                <DashboardPanel
                  displayOrders={displayOrders}
                  allOrders={myOrders}
                  currentMonth={currentMonth}
                  selectedClinic={selectedClinic}
                  onSelectOrder={(order) => { setSelectedOrder(order); }}
                />
              </div>
            )}
          </div>
        </div>
      )}
      {showAccount && <AccountSettingsModal user={user} onClose={()=>setShowAccount(false)}/>}
      {showRequestModal && (
        <GlobalRequestModal
          user={user}
          myOrders={myOrders}
          myRequests={myRequests}
          onSent={loadData}
          onClose={()=>setShowRequestModal(false)}
        />
      )}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);
  useEffect(() => {
    const wait = async () => {
      let t=0; while(!window._firebase&&t<30){await new Promise(r=>setTimeout(r,200));t++;}
      window._firebase.onAuthStateChanged(u => { setUser(u); setAuthReady(true); });
    };
    wait();
  }, []);
  if (!authReady) return (
    <div style={{ minHeight:"100vh",background:"linear-gradient(160deg,#0a1e35,#0f2744)",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.5)",fontSize:14 }}>読み込み中...</div>
  );
  return user ? <MainScreen user={user}/> : <LoginScreen/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
